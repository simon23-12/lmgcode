// ── 9b. Streaming helpers ─────────────────────────────────────────────────────

function inferFilename(lang) {
  const map = { html: 'index.html', css: 'style.css', js: 'script.js', javascript: 'script.js',
                python: 'main.py', py: 'main.py', java: 'Main.java', c: 'main.c',
                cpp: 'main.cpp', cs: 'main.cs', ts: 'main.ts', typescript: 'main.ts', ruby: 'main.rb' };
  return map[lang?.toLowerCase()] || (lang ? lang + '.txt' : 'output.txt');
}

function extractStreamingCode(text) {
  // Don't live-update during streaming if it's a SEARCH/REPLACE response (full or partial)
  if (text.includes('<<<<<<<')) return null;
  // Find the first code fence — if its identifier is a filename (has dot), stream into active tab
  // (will be redirected to new file at stream end). If it's a language tag, stream normally.
  const match = text.match(/```([\w./-]*)\n([\s\S]*?)(?:```|$)/);
  return match ? match[2] : null;
}

function applySearchReplace(text, currentContent) {
  // Normalize Llama's reversed separator format: ">>>>>>>\n=======" → "======="
  const normalizedText = text.replace(/\n>>>>>>>[^\S\n]*\r?\n(?========)/g, '\n');
  const blockPattern = /<<<<<<< SEARCH\r?\n([\s\S]*?)\r?\n=======\r?\n([\s\S]*?)\r?\n>>>>>>> REPLACE/g;
  let result = currentContent;
  let applied = 0, added = 0, removed = 0;
  let match;
  while ((match = blockPattern.exec(normalizedText)) !== null) {
    const search  = match[1];
    const replace = match[2];
    const normSearch = search.normalize('NFC');
    // Normalize result to NFC for comparison if needed
    const resultNFC = result.normalize('NFC');
    const useNFC = !result.includes(search) && resultNFC.includes(normSearch);
    const effectiveResult = useNFC ? resultNFC : result;
    const effectiveSearch = useNFC ? normSearch : search;
    if (effectiveResult.includes(effectiveSearch)) {
      // Exact match (with optional Unicode normalization)
      result = effectiveResult.replace(effectiveSearch, replace);
      removed += search.split('\n').length;
      added   += replace.split('\n').length;
      applied++;
    } else {
      // Fuzzy fallback: match line-by-line ignoring leading/trailing whitespace + Unicode normalization
      const nfc = s => s.normalize('NFC');
      const searchLines  = search.split('\n');
      const resultLines  = result.split('\n');
      const needle = searchLines.map(l => nfc(l.trim())).join('\n');
      let found = -1, foundLen = 0;
      for (let i = 0; i <= resultLines.length - searchLines.length; i++) {
        const slice = resultLines.slice(i, i + searchLines.length).map(l => nfc(l.trim())).join('\n');
        if (slice === needle) { found = i; foundLen = searchLines.length; break; }
      }
      if (found !== -1) {
        // Preserve indentation of first matched line
        const indent = (resultLines[found].match(/^(\s*)/) || ['',''])[1];
        const replaceLines = replace.split('\n').map((l, idx) =>
          idx === 0 ? indent + l.trimStart() : l
        );
        resultLines.splice(found, foundLen, ...replaceLines);
        result = resultLines.join('\n');
        removed += foundLen;
        added   += replaceLines.length;
        applied++;
      }
    }
  }
  return applied > 0 ? { content: result, count: applied, added, removed } : null;
}

async function fetchStream(builtPrompt, modelKey, onStreamStart, onSRDetected, agent, registerAbort) {
  const controller = new AbortController();
  registerAbort?.(() => { controller._manualAbort = true; controller.abort(); });
  const timer = setTimeout(() => controller.abort(), 57000);

  let res;
  try {
    res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: builtPrompt, model: modelKey, stream: true }),
      signal: controller.signal,
    });
    clearTimeout(timer);
  } catch (err) {
    clearTimeout(timer);
    if (err.name === 'AbortError') {
      if (controller._manualAbort) return { aborted: true };
      return { error: 'Timeout', retryable: true };
    }
    throw err;
  }

  if (!res.ok) {
    try { const d = await res.json(); return { error: d.error, retryable: res.status === 429 || res.status === 503 }; }
    catch { return { error: 'Serverfehler', retryable: res.status === 429 || res.status === 503 }; }
  }

  // Stream connected — only now dismiss the typing indicator
  // Freeze the target tab at stream-start so tab switches / agent switches don't redirect chunks
  let streamTargetTab = activeTab;
  onStreamStart();

  // Phase 2: if no token arrives within 60s, abort and retry next model
  let firstTokenTimer = setTimeout(() => controller.abort(), 60000);

  let fullText = '';
  let rafPending = false;
  let gotDone = false;
  let streamUsage = null;
  let srNotified = false;
  function scheduleMonacoUpdate() {
    if (rafPending) return;

    // On very first chunk: detect filename fence and redirect streaming to correct file
    if (agent.srStreamBase === null) {
      const fenceMatch = fullText.match(/^```([\w./-]+)\n/);
      const fenceName = fenceMatch ? fenceMatch[1] : null;
      const streamDir = streamTargetTab && streamTargetTab.includes('/') ? streamTargetTab.replace(/\/[^/]+$/, '/') : '';
      if (fenceName && fenceName.includes('.') && (!streamTargetTab || fenceName !== streamTargetTab.split('/').pop())) {
        // New file — create it immediately and switch editor to it for live streaming
        const targetPath = streamDir + fenceName;
        agent.srStreamBase = ''; // new file starts empty
        agent.streamCreatedFile = targetPath;
        streamTargetTab = targetPath; // follow the new file
        if (!vfs[targetPath]) addFile(targetPath, '');
        openTab(targetPath);
        renderTree();
      } else if (streamTargetTab && vfs[streamTargetTab]?.model) {
        agent.srStreamBase = vfs[streamTargetTab].model.getValue();
      } else if (!streamTargetTab && fenceName && !fenceName.includes('.')) {
        // Language tag (e.g. ```html) with no file open — infer a filename and create the file
        const targetPath = inferFilename(fenceName);
        agent.srStreamBase = '';
        agent.streamCreatedFile = targetPath;
        streamTargetTab = targetPath; // follow the new file
        if (!vfs[targetPath]) addFile(targetPath, '');
        openTab(targetPath);
        renderTree();
      } else {
        return; // no target yet
      }
    }

    if (!streamTargetTab || !vfs[streamTargetTab]?.model) return;
    const targetPath = streamTargetTab;
    rafPending = true;
    requestAnimationFrame(() => {
      rafPending = false;
      if (!vfs[targetPath]?.model) return;
      if (fullText.includes('<<<<<<< SEARCH')) {
        // Live-apply each completed SEARCH/REPLACE block as it arrives
        if (!srNotified) { srNotified = true; onSRDetected?.(); }
        const result = applySearchReplace(fullText, agent.srStreamBase);
        if (result) {
          agent.srStreamApplied = true;
          vfs[targetPath].model.setValue(result.content);
          vfs[targetPath].content = result.content;
        }
      } else {
        const code = extractStreamingCode(fullText);
        if (code !== null) {
          vfs[targetPath].model.setValue(code);
          vfs[targetPath].content = code;
        }
      }
    });
  }

  const reader = res.body.getReader();
  const decoder = new TextDecoder();
  let sseBuffer = '';

  try {
    outer: while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      sseBuffer += decoder.decode(value, { stream: true });
      const lines = sseBuffer.split('\n');
      sseBuffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const payload = line.slice(6).trim();
        if (payload === '[DONE]') { gotDone = true; break outer; }
        try {
          const parsed = JSON.parse(payload);
          if (parsed.error) return { error: parsed.error, retryable: !!parsed.retryable };
          if (parsed.usage) streamUsage = parsed.usage;
          const delta = parsed.choices?.[0]?.delta?.content ?? '';
          if (delta) {
            if (firstTokenTimer) { clearTimeout(firstTokenTimer); firstTokenTimer = null; }
            fullText += delta;
            scheduleMonacoUpdate();
          }
        } catch {}
      }
    }
  } catch (err) {
    if (err.name !== 'AbortError') throw err;
  }
  clearTimeout(firstTokenTimer);

  // Stream ended without [DONE] and no content → retryable (Vercel/model timeout)
  if (!gotDone && !fullText) return { error: 'Timeout', retryable: true };

  return {
    text: fullText,
    promptTokens: streamUsage?.prompt_tokens ?? null,
    completionTokens: streamUsage?.completion_tokens ?? null,
  };
}

const FALLBACK_CHAINS = {
  qwen:             ['qwen', 'geminiflashlite', 'minimax', 'nemotron', 'gemma'],
  minimax:          ['minimax', 'nemotron', 'qwen', 'gemma'],
  nemotron:         ['nemotron', 'minimax', 'qwen', 'gemma'],
  gemma:            ['gemma', 'geminiflashlite', 'qwen', 'minimax', 'nemotron'],
  geminiflashlite:  ['geminiflashlite', 'qwen', 'minimax', 'nemotron', 'llama'],
  llama:            ['llama', 'geminiflashlite', 'qwen', 'minimax', 'nemotron', 'gemma'],
  kimi:             ['kimi', 'minimax', 'geminiflashlite', 'qwen'],
};

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text  = input.value.trim();
  const agent = agents.get(activeAgentId);
  if (!text || agent.isTyping) return;
  agent.srStreamBase    = null;
  agent.srStreamApplied = false;
  agent.streamCreatedFile = null;
  agent.undoSnapshot    = null;
  document.getElementById('undo-btn').classList.remove('visible');

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('char-counter').textContent = `0/${input.maxLength}`;

  if (text.startsWith('/')) {
    if (handleSlashCommand(text, agent)) return;
  }

  const msgs = agent.messagesEl;
  const msgsScroll = document.getElementById('chat-messages');

  // User bubble
  const userDiv = document.createElement('div');
  userDiv.className = 'chat-msg user';
  userDiv.textContent = text;
  msgs.appendChild(userDiv);

  // Rename prompt (if unnamed file + detectable extension)
  await maybePromptRename(text, msgs);

  // Typing indicator
  const thinkingPhrases = [
    'Was wollte die Aufgabe eigentlich von mir…?',
    'Kurz so tun, als hätte ich das im Unterricht gehört…',
    'Halb vergessenes Wissen reanimieren...',
    'Irgendwas hinschreiben, sieht schlau aus...',
    'Das wirkt strukturiert genug...',
    'YOLO – Ansatz wird schon passen...',
    'Formel einsetzen und zu Herr Hüwe beten...',
    'Ergebnis sieht verdächtig aus... egal.',
    'Schön formatieren für halbe Extrapunkte...',
    'So erklären, dass es kompetent klingt...',
    'Abgeben und innerlich verabschieden…',
    'Absolutes Kino hier…',
    'Marcus würde lachen wenn er das sieht…',
    'Herr Fuhs und seine Aufgaben…',
    'Wann bekommt das LMG endlich vernünftige Rechner…',
    'Einfach mal die Formel von letztem Jahr recyclen...',
    'Gehirn im Energiesparmodus – hoffentlich reicht\'s...',
    'Das sieht aus wie eine Lösung, also ist es eine...',
    'Schnell noch \'ne Einheit hinzufügen, damit\'s professionell wirkt...',
    'Wahrscheinlich falsch, aber ästhetisch einwandfrei...',
    'Herr Hüwe würde sagen: „Fast richtig" – das reicht mir...',
    'Kurze Panik, dann kreative Interpretation der Aufgabenstellung...',
    'Taschenrechner hat auch schon aufgegeben...',
    'So tun, als wäre das der elegante Weg zur Lösung...',
    'Ergebnis auf 3 Nachkommastellen runden und beten...',
    'Marcus würde sagen: „Bro, das ist Kunst"...',
    'LMG-Rechner hätten das in 0,2 Sekunden erledigt...',
    'Halb richtig ist immerhin besser als gar nicht abgegeben...',
    'Das muss jetzt einfach stimmen, mein Karma hängt dran...',
    'Abgeben, weggehen und nie wieder dran denken...',
  ];
  const typingDiv = document.createElement('div');
  typingDiv.className = 'typing-indicator';
  const typingTimer = document.createElement('span');
  typingTimer.className = 'typing-timer';
  typingTimer.textContent = 'Denkt nach…';
  typingDiv.appendChild(typingTimer);
  const typingText = document.createElement('span');
  typingText.className = 'typing-text';
  let phraseIdx = Math.floor(Math.random() * thinkingPhrases.length);
  typingText.textContent = thinkingPhrases[phraseIdx];
  typingDiv.appendChild(typingText);
  msgs.appendChild(typingDiv);
  msgsScroll.scrollTop = msgsScroll.scrollHeight;
  let thinkSecs = 0;
  const timerInterval = setInterval(() => {
    thinkSecs++;
    typingTimer.textContent = `Denkt nach für ${thinkSecs} Sekunde${thinkSecs === 1 ? '' : 'n'}…`;
  }, 1000);
  const phraseInterval = setInterval(() => {
    phraseIdx = (phraseIdx + 1) % thinkingPhrases.length;
    typingText.style.animation = 'none';
    typingText.offsetHeight; // reflow
    typingText.style.animation = '';
    typingText.textContent = thinkingPhrases[phraseIdx];
  }, 3000);

  agent.isTyping = true;
  const sendBtn = document.getElementById('send-btn');
  sendBtn.disabled = false;
  sendBtn.classList.add('stop-mode');
  sendBtn.querySelector('i').className = 'fa-solid fa-stop';

  const t0 = Date.now();
  try {
  const selectedModel = document.getElementById('model-select').value;
  agent.model = selectedModel;
  const chain = FALLBACK_CHAINS[selectedModel] ?? FALLBACK_CHAINS.geminiflashlite;

  // Think → Code: For slow-thinking models on complex prompts, first fetch a plan (no code),
  // then pass it to the coding request. This splits thinking + coding across two 60s windows.
  const planModels = new Set(['qwen', 'minimax', 'nemotron']);
  let plan = null;
  if (planModels.has(selectedModel) && (agent.thinkMode || text.length > 200)) {
    typingTimer.textContent = 'Analysiert Aufgabe…';
    typingText.style.animation = 'none'; void typingText.offsetHeight; typingText.style.animation = '';
    typingText.textContent = 'Plant die Umsetzung…';
    const planPrompt = buildPlanningPrompt(text, agent);
    plan = await fetchPlan(planPrompt, selectedModel);
    if (plan) {
      typingTimer.textContent = 'Plan fertig. Schreibt…';
      typingText.style.animation = 'none'; void typingText.offsetHeight; typingText.style.animation = '';
      typingText.textContent = 'Jetzt wird\'s konkret…';
    }
  }

  const builtPrompt = buildPrompt(text, agent, plan);
  let data = null, networkError = false, errorHandled = false, durationMs = 0;

  if (liveMode) {
    // ── Streaming path with fallback chain ────────────────────────────────────
    let streamStarted = false;
    function onStreamStart() {
      if (streamStarted) return;
      streamStarted = true;
      if (activeTab && vfs[activeTab]?.content !== undefined) {
        agent.undoSnapshot = { path: activeTab, content: vfs[activeTab].content };
        document.getElementById('undo-btn').classList.add('visible');
      }
      clearInterval(phraseInterval);
      const hasContent = activeTab && vfs[activeTab]?.content?.trim();
      const vfsHasFiles = Object.keys(vfs).length > 0;
      typingTimer.textContent = hasContent ? 'Lese Code…' : vfsHasFiles ? 'Schaue Dateien an…' : 'Schreibe…';
      typingText.style.animation = 'none'; void typingText.offsetHeight; typingText.style.animation = '';
      typingText.textContent = hasContent
        ? `Lass mich die Stelle in ${activeTab} suchen…`
        : vfsHasFiles
          ? `Schaue mir die Dateien an…`
          : `Verstanden. Ich baue jetzt ${activeTab || 'den Code'}.`;
    }
    let srShown = false;
    function onSRDetected() {
      if (srShown) return;
      srShown = true;
      typingTimer.textContent = 'Edit läuft…';
      typingText.style.animation = 'none'; void typingText.offsetHeight; typingText.style.animation = '';
      typingText.textContent = 'Gefunden. Starte Edit.';
    }
    try {
      for (const modelKey of chain) {
        const result = await fetchStream(builtPrompt, modelKey, onStreamStart, onSRDetected, agent,
          fn => { agent.cancelStream = fn; });
        agent.cancelStream = null;
        if (result.text !== undefined) { data = result; break; }
        if (result.aborted) {
          if (agent.srStreamBase !== null && activeTab && vfs[activeTab]?.model) {
            vfs[activeTab].content = agent.srStreamBase;
            vfs[activeTab].model.setValue(agent.srStreamBase);
          }
          agent.srStreamBase = null;
          errorHandled = true;
          break;
        }
        if (!result.retryable) { sysMsg('Fehler: ' + result.error); errorHandled = true; break; }
        // retryable (timeout / 429) → try next model in chain
      }
    } catch (err) {
      networkError = true;
      console.error('[fetchStream error]', err);
    }
    clearInterval(phraseInterval); clearInterval(timerInterval); typingDiv.remove();
    durationMs = Date.now() - t0;
  } else {
    // ── Non-streaming fallback chain ──────────────────────────────────────────
    let res = null;
    for (const modelKey of chain) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), 57000);
      try {
        res = await fetch('/api/chat', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ prompt: builtPrompt, model: modelKey }),
          signal:  controller.signal,
        });
        clearTimeout(timer);
        data = await res.json();
        if (res.ok && !data.error) break;      // success
        if (!data.retryable) break;            // fatal error, stop
        data = null;                           // retryable → try next model
      } catch (err) {
        clearTimeout(timer);
        if (err.name !== 'AbortError') { networkError = true; break; }
        // AbortError = timeout → try next model
      }
    }
    durationMs = Date.now() - t0;
    clearInterval(phraseInterval); clearInterval(timerInterval); typingDiv.remove();
    if (data && (data.error || !res?.ok)) {
      sysMsg('Fehler: ' + (data?.error || 'Alle Modelle nicht erreichbar.'));
      errorHandled = true;
      data = null;
    }
  }

  if (networkError) {
    sysMsg('Netzwerkfehler – bitte erneut versuchen. (Details in der Browser-Konsole)');
  } else if (!data && !errorHandled) {
    sysMsg('Fehler: Alle Modelle nicht erreichbar.');
  } else if (data) {
      // Auto-apply: SEARCH/REPLACE-Blöcke oder (fallback) genau ein Codeblock
      // Use srStreamBase if streaming already applied blocks (so stats are computed against original)
      const srBase = agent.srStreamBase !== null ? agent.srStreamBase
                   : (activeTab && vfs[activeTab] ? vfs[activeTab].content : null);
      const srResult = srBase ? applySearchReplace(data.text, srBase) : null;
      // ── File blocks: collect all code blocks that have a filename as identifier ──
      const allBlocks = !srResult ? [...data.text.matchAll(/```([\w./-]*)\n([\s\S]*?)```/g)] : [];
      const dir = activeTab && activeTab.includes('/') ? activeTab.replace(/\/[^/]+$/, '/') : '';
      // A block is a "file block" if its fence identifier contains a dot (= filename)
      const fileBlocks = allBlocks.filter(m => m[1].includes('.'));
      // A block targets the active tab if its fence matches the active file's name or language
      const activeName = activeTab ? activeTab.split('/').pop() : '';
      const activeLang = activeTab && vfs[activeTab] ? vfs[activeTab].language : '';
      const activeTabBlock = allBlocks.length === 1 && !fileBlocks.length
        ? allBlocks[0]   // single block with language tag → treat as active-file update (or new file if no tab open)
        : null;
      const didAutoApply = !!(srResult || fileBlocks.length || activeTabBlock);

      let pendingQuip = null;
      if (didAutoApply && !agent.learnMode) {
        const newFileNames = fileBlocks.map(m => m[1]);
        const fname = newFileNames.length ? newFileNames.join(', ') : (activeTab || 'Datei');
        const action = srResult ? 'angepasst' : newFileNames.length ? 'angelegt' : 'erstellt';
        const doneMessages = newFileNames.length ? [
          `${fname} angelegt.`,
          `Fertig — ${fname} ist neu im Dateibaum.`,
          `${fname} wurde erstellt — schau mal rein.`,
          `Neue Datei${newFileNames.length > 1 ? 'en' : ''}: ${fname}.`,
        ] : [
          `Erledigt. ${fname} wurde ${action}.`,
          `Fertig — ${fname} wurde ${action}.`,
          `Gemacht. ${fname} ist jetzt ${action}.`,
          `${fname} wurde ${action}. Schau mal rein.`,
          `Passt. ${fname} ist aktualisiert.`,
          `${fname} ist bereit.`,
          `Alles drin. ${fname} wurde ${action}.`,
          `${fname} wurde ${action} — sieh es dir an.`,
        ];
        const quipDiv = document.createElement('div');
        quipDiv.className = 'chat-msg bot';
        quipDiv.textContent = doneMessages[Math.floor(Math.random() * doneMessages.length)];
        msgs.appendChild(quipDiv);
        pendingQuip = quipDiv;
      } else {
        // Streaming may have written partial content into the active file — restore the original
        if (!agent.streamCreatedFile && agent.srStreamBase !== null && activeTab && vfs[activeTab]?.model) {
          vfs[activeTab].content = agent.srStreamBase;
          vfs[activeTab].model.setValue(agent.srStreamBase);
        }
        const botDiv = document.createElement('div');
        botDiv.className = 'chat-msg bot';
        // Wrap SEARCH/REPLACE blocks in code fences so marked.js doesn't misparse '=======' as a setext heading
        const safeText = data.text.replace(
          /(<<<<<<< SEARCH[\s\S]*?>>>>>>> REPLACE)/g,
          '```\n$1\n```'
        );
        botDiv.innerHTML = marked.parse(safeText);
        if (/<<<<<<< SEARCH/.test(data.text) && !srResult) {
          sysMsgHtml('⚠ Konnte nicht automatisch angewendet werden — Suche fand keine exakte Übereinstimmung.');
        }
        msgs.appendChild(botDiv);
      }

      if (srResult) {
        if (!agent.srStreamApplied) {
          // Non-streaming mode: apply now
          if (!agent.undoSnapshot && activeTab && vfs[activeTab]?.content !== undefined) {
            agent.undoSnapshot = { path: activeTab, content: vfs[activeTab].content };
            document.getElementById('undo-btn').classList.add('visible');
          }
          vfs[activeTab].content = srResult.content;
          vfs[activeTab].model.setValue(srResult.content);
        }
        sysMsgHtml(`✓ ${srResult.count} Stelle(n) in ${activeTab} aktualisiert &nbsp;<span style="color:#4caf50">+${srResult.added}</span> <span style="color:#f44336">−${srResult.removed}</span>`);
      } else if (fileBlocks.length) {
        // Restore active tab only if streaming wrote into it unintentionally (not a new file we created)
        if (!agent.streamCreatedFile && agent.srStreamBase !== null && activeTab && vfs[activeTab]?.model) {
          vfs[activeTab].content = agent.srStreamBase;
          vfs[activeTab].model.setValue(agent.srStreamBase);
        }
        // Detect obviously wrong content for a given file extension
        const contentMismatch = (filename, code) => {
          const ext = filename.split('.').pop().toLowerCase();
          const looksLikeHtml = /^\s*<!DOCTYPE|^\s*<html/i.test(code);
          if (ext === 'css' && looksLikeHtml) return 'CSS-Datei enthält HTML';
          if (ext === 'js' && looksLikeHtml) return 'JS-Datei enthält HTML';
          if (ext === 'py' && looksLikeHtml) return 'Python-Datei enthält HTML';
          if (ext === 'java' && looksLikeHtml) return 'Java-Datei enthält HTML';
          return null;
        };
        let lastPath = null;
        for (const blk of fileBlocks) {
          const newCode = blk[2].replace(/\n$/, '');
          const newLines = (newCode.match(/\n/g) || []).length + 1;
          const newPath = dir + blk[1];
          // Guard: model wrapped SEARCH/REPLACE markers inside a file-named fence
          if (newCode.includes('<<<<<<< SEARCH')) {
            const innerBase = srBase || (activeTab && vfs[activeTab] ? vfs[activeTab].content : null);
            const innerResult = innerBase ? applySearchReplace(newCode, innerBase) : null;
            if (innerResult) {
              vfs[activeTab].content = innerResult.content;
              vfs[activeTab].model.setValue(innerResult.content);
              lastPath = activeTab;
              sysMsgHtml(`✓ ${innerResult.count} Stelle(n) in ${activeTab} aktualisiert &nbsp;<span style="color:#4caf50">+${innerResult.added}</span> <span style="color:#f44336">−${innerResult.removed}</span>`);
            } else {
              sysMsgHtml(`⚠ <b>${blk[1]}</b> — SEARCH-Text nicht gefunden (Datei evtl. zu groß für Kontext). Antwort oben anzeigen und manuell übernehmen.`);
            }
            continue;
          }
          const mismatch = contentMismatch(blk[1], newCode);
          if (mismatch) {
            sysMsgHtml(`⚠ <b>${blk[1]}</b> übersprungen — Modell hat falschen Inhalt generiert (${mismatch}). Bitte nochmal versuchen oder anderes Modell wählen.`);
            continue;
          }
          const isActiveFile = activeTab && blk[1] === activeTab.split('/').pop();
          if (isActiveFile) {
            if (vfs[activeTab]?.model) {
              vfs[activeTab].content = newCode;
              vfs[activeTab].model.setValue(newCode);
            }
            lastPath = activeTab;
            sysMsgHtml(`✓ <b>${activeTab}</b> aktualisiert &nbsp;<span style="color:#4caf50">+${newLines}</span>`);
          } else {
            addFile(newPath, newCode);
            lastPath = newPath;
            sysMsgHtml(`✓ <b>${newPath}</b> angelegt &nbsp;<span style="color:#4caf50">+${newLines}</span>`);
          }
        }
        if (lastPath) {
          openTab(lastPath); renderTree();
        } else if (pendingQuip) {
          // All file blocks failed — remove the premature quip and show the bot response instead
          msgs.removeChild(pendingQuip);
          const botDiv = document.createElement('div');
          botDiv.className = 'chat-msg bot';
          const safeText = data.text.replace(/(<<<<<<< SEARCH[\s\S]*?>>>>>>> REPLACE)/g, '```\n$1\n```');
          botDiv.innerHTML = marked.parse(safeText);
          msgs.appendChild(botDiv);
        }
      } else if (activeTabBlock) {
        // If no file is open but streaming already created one (language-tag fence), use that
        if (!activeTab && agent.streamCreatedFile && vfs[agent.streamCreatedFile]) {
          openTab(agent.streamCreatedFile); renderTree();
        }
        // If still no file open, infer from language tag and create now
        if (!activeTab) {
          const lang = activeTabBlock[1];
          const newPath = inferFilename(lang);
          addFile(newPath, '');
          openTab(newPath); renderTree();
        }
        const newCode = activeTabBlock[2].replace(/\n$/, '');
        // Guard: if the code block contains SEARCH/REPLACE markers, the model wrapped them in a
        // fence instead of outputting them bare. Try to apply as SEARCH/REPLACE first.
        if (newCode.includes('<<<<<<< SEARCH')) {
          // Restore original content if streaming partially wrote the file
          if (agent.srStreamBase !== null && !agent.srStreamApplied && activeTab && vfs[activeTab]?.model) {
            vfs[activeTab].content = agent.srStreamBase;
            vfs[activeTab].model.setValue(agent.srStreamBase);
          }
          const innerBase = srBase || (activeTab && vfs[activeTab] ? vfs[activeTab].content : null);
          const innerResult = innerBase ? applySearchReplace(newCode, innerBase) : null;
          if (innerResult) {
            vfs[activeTab].content = innerResult.content;
            vfs[activeTab].model.setValue(innerResult.content);
            sysMsgHtml(`✓ ${innerResult.count} Stelle(n) in ${activeTab} aktualisiert &nbsp;<span style="color:#4caf50">+${innerResult.added}</span> <span style="color:#f44336">−${innerResult.removed}</span>`);
          } else {
            sysMsgHtml('⚠ Konnte nicht automatisch angewendet werden — Suche fand keine exakte Übereinstimmung.');
          }
        } else {
          const newLines = (newCode.match(/\n/g) || []).length + 1;
          const isEmpty = !activeTab || vfs[activeTab]?.content.trim() === '';
          const oldLines = isEmpty ? 0 : (vfs[activeTab].content.match(/\n/g) || []).length + 1;
          // Guard: if new code is less than 50% of original, it's likely a partial — don't overwrite
          if (!isEmpty && newLines < oldLines * 0.5) {
            sysMsgHtml(`⚠ Modell hat nur einen Teil ausgegeben (${newLines} von ${oldLines} Zeilen) — Datei wurde <b>nicht</b> überschrieben. Bitte SEARCH/REPLACE verwenden oder Änderung manuell einfügen.`);
          } else if (activeTab && vfs[activeTab]) {
            vfs[activeTab].content = newCode;
            vfs[activeTab].model.setValue(newCode);
            sysMsgHtml(`✓ ${activeTab} wurde aktualisiert &nbsp;<span style="color:#4caf50">+${newLines}</span>`);
          }
        }
      }

      agent.chatHistory.push({ role: 'user', text });
      agent.chatHistory.push({ role: 'bot',  text: data.text });
      if (agent.chatHistory.length > 20) agent.chatHistory = agent.chatHistory.slice(-20);

      const ct = data.completionTokens ?? null;
      const pt = data.promptTokens ?? null;
      if (ct != null) agent.sessionTokens += ct;
      if (pt != null) agent.sessionTokens += pt;
      updateChatStats(ct, durationMs);
  }

  } finally {
    agent.isTyping = false;
    agent.cancelStream = null;
    const _sb = document.getElementById('send-btn');
    _sb.classList.remove('stop-mode');
    _sb.querySelector('i').className = 'fa-solid fa-arrow-up';
    _sb.disabled = false;
    msgsScroll.scrollTop = msgsScroll.scrollHeight;
  }
}

document.getElementById('send-btn').onclick = function() {
  const agent = agents.get(activeAgentId);
  if (agent?.isTyping && agent.cancelStream) {
    agent.cancelStream();
  } else {
    sendMessage();
  }
};

const chatInput = document.getElementById('chat-input');
let chatInputManualHeight = null;

function applyEnterMode(sends) {
  chatInput._enterSends = sends;
}
// Restore on load (default: Ctrl+Enter sends — Enter = new line)
applyEnterMode(localStorage.getItem('slashEnterSends') === 'true');

chatInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); sendMessage(); return; }
  if (e.key === 'Enter' && !e.shiftKey && chatInput._enterSends) { e.preventDefault(); sendMessage(); return; }
  if (chatInputManualHeight === null) {
    setTimeout(() => {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 400) + 'px';
    }, 0);
  }
});

// Drag handle to resize chat input upward
(function() {
  const handle = document.getElementById('chat-input-resize-handle');
  let startY, startH;
  handle.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startY = e.clientY;
    startH = chatInput.getBoundingClientRect().height;
    document.body.style.cursor = 'ns-resize';
    document.body.style.userSelect = 'none';

    function onMove(e) {
      const delta = startY - e.clientY;
      const newH = Math.min(400, Math.max(38, startH + delta));
      chatInput.style.height = newH + 'px';
      chatInputManualHeight = newH;
    }
    function onUp() {
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// Warn on unload
window.addEventListener('beforeunload', e => {
  if (Object.keys(vfs).length > 0) { e.preventDefault(); e.returnValue = ''; }
});

// ── 10. Monaco Loader ─────────────────────────────────────────────────────────
window.MonacoEnvironment = {
  getWorkerUrl(_moduleId, _label) {
    return `data:text/javascript;charset=utf-8,${encodeURIComponent(`
      self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/' };
      importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/base/worker/workerMain.js');
    `)}`;
  }
};

const ms = document.createElement('script');
ms.src = 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs/loader.js';
ms.onload = () => {
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.47.0/min/vs' } });
  require(['vs/editor/editor.main'], initMonaco);
};
document.head.appendChild(ms);
