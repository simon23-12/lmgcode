<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LMG Code</title>
  <link rel="icon" type="image/jpeg" href="/Logo LMG Code.jpg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:            #1e1e1e;
      --sidebar-bg:    #252526;
      --header-bg:     #1a2744;
      --tab-inactive:  #2d2d2d;
      --tab-active:    #1e1e1e;
      --border:        #3e3e42;
      --text:          #cccccc;
      --text-dim:      #858585;
      --accent:        #0078d4;
      --accent-hover:  #1a8ae0;
      --chat-bot-bg:   #2a2a2a;
      --input-bg:      #3c3c3c;
      --scrollbar:     #424242;
    }
    body.light-mode {
      --bg:            #ffffff;
      --sidebar-bg:    #f3f3f3;
      --tab-inactive:  #ececec;
      --tab-active:    #ffffff;
      --border:        #d4d4d4;
      --text:          #1e1e1e;
      --text-dim:      #6e6e6e;
      --chat-bot-bg:   #e8e8e8;
      --input-bg:      #ffffff;
      --scrollbar:     #c0c0c0;
    }
    body.light-mode .upload-btn:hover { background: #dcdcdc; }
    body.light-mode .tab:hover { background: #e0e0e0; color: var(--text); }
    body.light-mode .chat-msg.bot pre { background: #f0f0f0; }
    body.light-mode .chat-msg.bot code { background: rgba(0,0,0,0.07); }
    body.light-mode .chat-msg.bot strong { color: #000; }
    body.light-mode #ctx-menu { background: #ffffff; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    body.light-mode .ctx-item:hover { background: rgba(0,0,0,0.06); }
    body.light-mode #header-byline .sep { color: rgba(255,255,255,0.4); }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; }

    #app { display: flex; flex-direction: column; height: 100dvh; }

    /* ── Header ── */
    #header {
      height: 48px; background: var(--header-bg); display: flex; align-items: center;
      padding: 0 16px; gap: 12px; flex-shrink: 0;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    #header img { height: 46px; width: 46px; border-radius: 6px; object-fit: cover; }
    #header h1 { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: 0.2px; }
    #header-byline { margin-left: auto; font-size: 11px; color: var(--text-dim); display: flex; align-items: center; gap: 8px; }
    #header-byline .sep { color: rgba(255,255,255,0.2); }
    #header-about { font-size: 11px; color: var(--text-dim); text-decoration: none; transition: color 0.15s; }
    #header-about:hover { color: #fff; }

    /* ── Workspace ── */
    #workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Resizer ── */
    .resizer {
      width: 5px; background: var(--border); cursor: col-resize; flex-shrink: 0;
      transition: background 0.15s; z-index: 10; user-select: none; position: relative;
    }
    .resizer::after {
      content: ''; position: absolute; inset: 0 -4px; /* wider grab zone */
    }
    .resizer:hover, .resizer.dragging { background: var(--accent); }

    /* ── Sidebar ── */
    #sidebar { width: 240px; min-width: 80px; max-width: 480px; flex-shrink: 0;
      background: var(--sidebar-bg); border-right: none;
      display: flex; flex-direction: column; overflow: hidden; }

    #upload-toolbar { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; }

    .upload-btn {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      padding: 5px 6px; border-radius: 4px; cursor: pointer; font-size: 11px;
      display: flex; align-items: center; gap: 4px; justify-content: center;
      transition: background 0.15s; font-family: inherit;
    }
    .upload-btn:hover { background: #4a4a4a; }

    #sidebar-label { font-size: 10px; font-weight: 700; color: var(--text-dim);
      text-transform: uppercase; letter-spacing: 1px; padding: 8px 12px 4px; flex-shrink: 0; }

    #file-tree { flex: 1; overflow-y: auto; padding: 4px 0; }
    #file-tree::-webkit-scrollbar { width: 6px; }
    #file-tree::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .tree-empty { padding: 20px 12px; color: var(--text-dim); font-size: 11px;
      text-align: center; line-height: 1.6; }
    .tree-empty i { font-size: 28px; display: block; margin-bottom: 10px; opacity: 0.25; }

    .tree-folder { padding: 4px 8px 3px 12px; font-size: 11px; color: var(--text-dim);
      display: flex; align-items: center; gap: 5px; user-select: none; margin-top: 6px; }
    .tree-folder i { font-size: 10px; }

    .tree-file {
      padding: 3px 8px 3px 24px; font-size: 12px; color: var(--text);
      display: flex; align-items: center; gap: 6px; cursor: pointer;
      border-radius: 3px; margin: 0 4px; user-select: none;
    }
    .tree-file:hover { background: rgba(255,255,255,0.06); }
    .tree-file.active { background: rgba(0,120,212,0.18); color: #fff; }
    .tree-file i { font-size: 11px; flex-shrink: 0; color: var(--text-dim); }
    .tree-file .fname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #file-tree.drag-over { outline: 2px dashed var(--accent); outline-offset: -4px;
      background: rgba(0,120,212,0.07); }

    /* ── Editor Column ── */
    #editor-column { flex: 1; min-width: 0; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }

    #tabs-bar { min-height: 35px; background: var(--sidebar-bg); border-bottom: 1px solid var(--border);
      display: flex; overflow-x: auto; overflow-y: hidden; flex-shrink: 0; }
    #tabs-bar::-webkit-scrollbar { height: 3px; }
    #tabs-bar::-webkit-scrollbar-thumb { background: var(--scrollbar); }

    .tab {
      height: 35px; padding: 0 10px; display: flex; align-items: center; gap: 6px;
      background: var(--tab-inactive); border-right: 1px solid var(--border);
      cursor: pointer; white-space: nowrap; font-size: 12px; color: var(--text-dim);
      flex-shrink: 0; user-select: none; transition: background 0.1s;
    }
    .tab:hover { background: #333; color: var(--text); }
    .tab.active { background: var(--tab-active); color: var(--text); border-top: 2px solid var(--accent); }
    .tab i { font-size: 11px; }
    .tab-close { width: 16px; height: 16px; border-radius: 3px; display: flex;
      align-items: center; justify-content: center; font-size: 10px; color: transparent;
      transition: background 0.1s, color 0.1s; }
    .tab:hover .tab-close, .tab.active .tab-close { color: var(--text-dim); }
    .tab-close:hover { background: rgba(255,255,255,0.15) !important; color: var(--text) !important; }

    #editor-area { flex: 1; position: relative; overflow: hidden; }
    #monaco-container { position: absolute; inset: 0; }
    #preview-frame { position: absolute; inset: 0; width: 100%; height: 100%; border: none; background: #fff; display: none; }
    #run-output {
      position: absolute; inset: 0; overflow-y: auto; display: none;
      background: #0d0d0d; color: #e0e0e0; font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px; padding: 14px 16px; box-sizing: border-box; white-space: pre-wrap; word-break: break-word;
    }
    #run-output .ro-stdout { color: #e0e0e0; }
    #run-output .ro-stderr { color: #f87171; }
    #run-output .ro-info   { color: #6b7280; font-style: italic; }
    #run-output .ro-exit0  { color: #4ade80; }
    #run-output .ro-exit1  { color: #f87171; }
    #run-output .ro-input-prompt { color: #e0e0e0; }
    #run-output .ro-input-row { display: inline-flex; align-items: center; gap: 4px; }
    #run-output .ro-input { background: #1a1a2e; color: #e0e0e0; border: 1px solid #4b5563;
      padding: 1px 6px; font-family: inherit; font-size: inherit; outline: none; min-width: 160px; }
    #run-output .ro-input-btn { background: #374151; color: #e0e0e0; border: none;
      padding: 2px 8px; cursor: pointer; font-family: inherit; font-size: inherit; }
    #run-output .ro-input-btn:hover { background: #4b5563; }

    #preview-btn, #run-btn {
      margin-left: auto; margin-right: 6px; align-self: center; flex-shrink: 0;
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      font-size: 11px; font-family: inherit; border-radius: 4px; padding: 2px 8px;
      cursor: pointer; display: flex; align-items: center; gap: 5px; white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    #preview-btn:hover, #run-btn:hover { border-color: var(--accent); color: var(--text); }
    #preview-btn.active, #run-btn.active { border-color: var(--accent); color: var(--accent); }

    #editor-placeholder {
      position: absolute; inset: 0; z-index: 5; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: var(--bg);
      color: var(--text-dim); gap: 10px; pointer-events: none;
    }
    #editor-placeholder i { font-size: 52px; opacity: 0.12; }
    #editor-placeholder p { font-size: 13px; opacity: 0.5; }

    /* ── Chat Panel ── */
    #chat-panel { width: 340px; min-width: 150px; max-width: 580px; flex-shrink: 0;
      background: var(--sidebar-bg); border-left: none;
      display: flex; flex-direction: column; overflow: hidden; }

    #chat-header { padding: 0 12px; height: 35px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }

    #chat-header-title { font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-dim); display: flex; align-items: center; gap: 6px; }

#model-select {
      background: var(--input-bg); border: 1px solid var(--border); color: var(--text);
      font-size: 11px; font-family: inherit; border-radius: 4px; padding: 2px 6px;
      cursor: pointer; outline: none; appearance: none; -webkit-appearance: none;
    }
    #model-select:hover { border-color: var(--accent); }

    #clear-chat-btn { background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 12px; padding: 3px 6px; border-radius: 3px; }
    #clear-chat-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    #add-agent-btn { background: none; border: none; color: var(--text-dim); cursor: pointer;
      font-size: 12px; padding: 3px 6px; border-radius: 3px; }
    #add-agent-btn:hover { color: var(--text); background: rgba(255,255,255,0.07); }

    /* ── Agent Tabs ── */
    #agent-tabs { display: none; padding: 4px 8px 0; flex-shrink: 0;
      align-items: flex-end; gap: 3px; overflow-x: auto; }
    #agent-tabs::-webkit-scrollbar { height: 0; }
    #agent-tabs.visible { display: flex; }
    .agent-tab { display: flex; align-items: center; gap: 5px; padding: 3px 10px;
      border-radius: 5px 5px 0 0; font-size: 11px; color: var(--text-dim); cursor: pointer;
      border: 1px solid var(--border); border-bottom: none; background: transparent;
      white-space: nowrap; user-select: none; transition: background 0.12s, color 0.12s; }
    .agent-tab:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .agent-tab.active { background: var(--sidebar-bg); color: var(--text); border-color: var(--border); }
    .agent-tab .tab-close { opacity: 0.5; font-size: 9px; cursor: pointer;
      line-height: 1; padding: 1px 2px; border-radius: 2px; margin-left: 2px; }
    .agent-tab .tab-close:hover { opacity: 1; background: rgba(255,255,255,0.12); }
    .agent-pane { display: flex; flex-direction: column; gap: 8px; }
    .agent-pane.hidden { display: none; }

    /* ── Learn Mode Toggle ── */
    #learn-toggle {
      display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none;
      font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
      border-radius: 12px; padding: 2px 8px 2px 5px; transition: border-color 0.15s, color 0.15s;
    }
    #learn-toggle:hover { border-color: var(--accent); color: var(--text); }
    #learn-toggle.active { border-color: #22c55e; color: #22c55e; }
    #learn-toggle .toggle-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
      flex-shrink: 0; transition: background 0.15s;
    }
    #learn-toggle.active .toggle-dot { background: #22c55e; }

    /* ── Undo Button ── */
    #undo-btn {
      display: none; align-items: center; gap: 5px; cursor: pointer; user-select: none;
      font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
      border-radius: 12px; padding: 2px 8px; background: none;
      transition: border-color 0.15s, color 0.15s;
    }
    #undo-btn.visible { display: flex; }
    #undo-btn:hover { border-color: var(--accent); color: var(--text); }

    /* ── Think Mode Toggle ── */
    #think-toggle {
      display: flex; align-items: center; gap: 5px; cursor: pointer; user-select: none;
      font-size: 10px; color: var(--text-dim); border: 1px solid var(--border);
      border-radius: 12px; padding: 2px 8px 2px 5px; transition: border-color 0.15s, color 0.15s;
    }
    #think-toggle:hover { border-color: var(--accent); color: var(--text); }
    #think-toggle.active { border-color: #f97316; color: #f97316; }
    #think-toggle .toggle-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim);
      flex-shrink: 0; transition: background 0.15s;
    }
    #think-toggle.active .toggle-dot { background: #f97316; }

    #chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex;
      flex-direction: column; gap: 8px; }
    #chat-messages::-webkit-scrollbar { width: 5px; }
    #chat-messages::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

    .chat-msg { max-width: 94%; line-height: 1.5; }

    .chat-msg.user { align-self: flex-end; background: var(--accent); color: #fff;
      padding: 8px 11px; border-radius: 12px 12px 3px 12px; font-size: 13px;
      white-space: pre-wrap; word-break: break-word; }

    .chat-msg.bot { align-self: flex-start; background: var(--chat-bot-bg); padding: 10px 12px;
      border-radius: 3px 12px 12px 12px; font-size: 13px; word-break: break-word; max-width: 100%; }
    .chat-msg.bot p { margin: 3px 0; }
    .chat-msg.bot p:first-child { margin-top: 0; }
    .chat-msg.bot p:last-child { margin-bottom: 0; }
    .chat-msg.bot ul, .chat-msg.bot ol { padding-left: 18px; margin: 4px 0; }
    .chat-msg.bot li { margin: 2px 0; }
    .chat-msg.bot pre { background: #1a1a1a; border: 1px solid var(--border); border-radius: 5px;
      padding: 10px 12px; overflow-x: auto; margin: 6px 0; }
    .chat-msg.bot pre code { font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 12px; background: none; padding: 0; }
    .chat-msg.bot code { font-family: 'Cascadia Code','Fira Code','Consolas',monospace;
      font-size: 12px; background: rgba(255,255,255,0.07); padding: 1px 5px; border-radius: 3px; }
    .chat-msg.bot strong { color: #fff; }

    .chat-msg.system { align-self: center; color: var(--text-dim); font-size: 11px;
      font-style: italic; text-align: center; }

    .typing-indicator { align-self: flex-start; background: var(--chat-bot-bg);
      padding: 10px 14px; border-radius: 3px 12px 12px 12px;
      display: flex; flex-direction: column; align-items: flex-start; gap: 4px; max-width: 90%; }
    .typing-timer { color: var(--text-dim); font-size: 11px; opacity: 0.7; }
    .typing-text { color: var(--text-dim); font-size: 12px; font-style: italic;
      animation: fadePhrase 0.4s ease; }
    @keyframes fadePhrase {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    #chat-input-area { padding: 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
    #chat-input-row { display: flex; gap: 8px; align-items: flex-end; }

    #chat-input-resize-handle {
      height: 5px; margin: 0 -10px 4px; cursor: ns-resize;
      display: flex; align-items: center; justify-content: center;
    }
    #chat-input-resize-handle::after {
      content: ''; display: block; width: 32px; height: 3px;
      border-radius: 2px; background: var(--border);
      transition: background 0.15s;
    }
    #chat-input-resize-handle:hover::after { background: var(--text-dim); }

    #chat-input {
      flex: 1; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); padding: 8px 10px; font-size: 13px; font-family: inherit;
      resize: none; min-height: 38px; max-height: 400px; line-height: 1.4; outline: none;
      transition: border-color 0.15s;
    }
    #char-counter {
      font-size: 10px; color: var(--text-dim); text-align: right; margin-top: 2px;
    }
    #chat-input:focus { border-color: var(--accent); }
    #chat-input::placeholder { color: var(--text-dim); }

    #send-btn { width: 36px; height: 36px; background: rgba(255,255,255,0.08); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text-dim); cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 14px; flex-shrink: 0; transition: background 0.15s, color 0.15s, border-color 0.15s; }
    #send-btn:hover { background: rgba(255,255,255,0.14); color: var(--text); border-color: rgba(255,255,255,0.25); }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    #send-btn.stop-mode { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #ef4444; }
    #send-btn.stop-mode:hover { background: rgba(239,68,68,0.28); border-color: rgba(239,68,68,0.7); }

    #chat-stats { font-size: 10px; color: var(--text-dim); margin-top: 5px; display: flex; gap: 10px; }
    #chat-stats span { opacity: 0.7; }

    /* ── Context Menu ── */
    #ctx-menu {
      position: fixed; z-index: 1000; background: #2d2d2d; border: 1px solid var(--border);
      border-radius: 5px; box-shadow: 0 4px 16px rgba(0,0,0,0.5); padding: 4px 0;
      min-width: 130px; display: none;
    }
    .ctx-item {
      padding: 7px 14px; font-size: 12px; cursor: pointer; color: var(--text);
      display: flex; align-items: center; gap: 8px;
    }
    .ctx-item:hover { background: rgba(255,255,255,0.08); }
    .ctx-item.danger { color: #f87171; }
    .ctx-item.danger:hover { background: rgba(248,113,113,0.1); }
  </style>
</head>
<body>
<div id="app">
  <header id="header">
    <img src="Logo LMG Code.jpg" alt="LMG">
    <h1>LMG Code</h1>
    <span id="header-byline">by Simon ❤️<span class="sep">|</span><a id="header-about" href="about.html">about</a></span>
  </header>

  <div id="workspace">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div id="upload-toolbar">
        <button class="upload-btn" id="btn-folder">
          <i class="fa-solid fa-folder-open"></i> Öffnen
        </button>
        <button class="upload-btn" id="btn-save">
          <i class="fa-solid fa-floppy-disk"></i> Speichern
        </button>
        <button class="upload-btn" id="btn-new" style="flex:0;padding:5px 10px;" title="Neue Datei">
          <i class="fa-solid fa-plus"></i>
        </button>
        <button class="upload-btn" id="btn-delete" style="flex:0;padding:5px 10px;" title="Datei löschen">
          <i class="fa-solid fa-minus"></i>
        </button>
      </div>
      <div id="sidebar-label">Dateien</div>
      <div id="file-tree">
        <div class="tree-empty">
          <i class="fa-solid fa-folder-open"></i>
          Lade einen Ordner hoch oder erstelle eine neue Datei mit dem Plus-Button.
        </div>
      </div>
    </aside>

    <div class="resizer" id="resizer-left"></div>

    <!-- Editor -->
    <div id="editor-column">
      <div id="tabs-bar">
        <button id="preview-btn" title="Vorschau umschalten"><i class="fa-solid fa-play"></i> Vorschau</button>
        <button id="run-btn" title="Code ausführen" style="display:none"><i class="fa-solid fa-play"></i> Run</button>
      </div>
      <div id="editor-area">
        <div id="monaco-container"></div>
        <iframe id="preview-frame" sandbox="allow-scripts allow-forms allow-modals"></iframe>
        <div id="run-output"></div>
        <div id="editor-placeholder">
          <i class="fa-solid fa-code"></i>
          <p>Datei aus dem Baum öffnen</p>
        </div>
      </div>
    </div>

    <div class="resizer" id="resizer-right"></div>

    <!-- Chat -->
    <div id="chat-panel">
      <div id="agent-tabs"></div>
      <div id="chat-header">
        <div id="chat-header-title">
          <i class="fa-solid fa-robot"></i>
          <select id="model-select" title="Modell wählen">
            <option value="qwen">Qwen3 Coder 480B</option>
            <option value="minimax">MiniMax M2.5</option>
            <option value="nemotron">Nemotron 3 Super</option>
            <option value="gemma">Gemma 4 31B</option>
            <option value="geminiflashlite" selected>Gemini 3.1 Flash Lite</option>
            <option value="llama">Llama 3.3 70B</option>
            <option value="kimi">Kimi K2</option>
          </select>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div id="learn-toggle" title="Lernmodus: Änderungen werden erklärt">
            <span class="toggle-dot"></span>Lernmodus
          </div>
          <button id="undo-btn" title="Letzte KI-Änderung rückgängig machen">
            <i class="fa-solid fa-rotate-left"></i> Undo
          </button>
          <button id="add-agent-btn" title="Neuen Agenten spawnen">
            <i class="fa-solid fa-plus"></i>
          </button>
          <button id="clear-chat-btn" title="Chat leeren">
            <i class="fa-solid fa-trash-can"></i>

<script>
// ── 1. State ─────────────────────────────────────────────────────────────────
const vfs      = {};   // { path: { content, language, model } }
let openTabs   = [];
let activeTab  = null;
let editor     = null;
let liveMode   = true;
let dirHandle  = null;  // File System Access API handle (wenn Ordner via showDirectoryPicker geöffnet)

// ── Multi-Agent State ─────────────────────────────────────────────────────────
const agents = new Map();
let nextAgentId = 0;
let activeAgentId = null;

function createAgentPane(id) {
  const pane = document.createElement('div');
  pane.className = 'agent-pane hidden';
  pane.dataset.agentId = id;
  const welcome = document.createElement('div');
  welcome.className = 'chat-msg system';
  welcome.textContent = id === 0 ? 'Willkommen bei LMG Code!' : `Agent ${id + 1} bereit.`;
  pane.appendChild(welcome);
  document.getElementById('chat-messages').appendChild(pane);
  return pane;
}

function createAgent() {
  const id = nextAgentId++;
  const pane = createAgentPane(id);
  agents.set(id, {
    id,
    chatHistory: [],
    learnMode: false,
    thinkMode: false,
    isTyping: false,
    cancelStream: null,
    sessionTokens: 0,
    model: 'geminiflashlite',
    srStreamBase: null,
    srStreamApplied: false,
    streamCreatedFile: null,
    undoSnapshot: null,
    messagesEl: pane,
  });
  return id;
}

function renderAgentTabs() {
  const tabsEl = document.getElementById('agent-tabs');
  const count = agents.size;
  tabsEl.classList.toggle('visible', count > 1);
  tabsEl.innerHTML = '';
  for (const [id] of agents) {
    const tab = document.createElement('div');
    tab.className = 'agent-tab' + (id === activeAgentId ? ' active' : '');
    const label = document.createElement('span');
    label.textContent = `Agent ${id + 1}`;
    tab.appendChild(label);
    if (count > 1) {
      const closeBtn = document.createElement('span');
      closeBtn.className = 'tab-close';
      closeBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
      closeBtn.title = 'Agent schließen';
      closeBtn.onclick = (e) => { e.stopPropagation(); removeAgent(id); };
      tab.appendChild(closeBtn);
    }
    tab.onclick = () => switchAgent(id);
    tabsEl.appendChild(tab);
  }
}

function switchAgent(id) {
  if (id === activeAgentId) return;
  if (activeAgentId !== null) {
    const cur = agents.get(activeAgentId);
    if (cur) cur.messagesEl.classList.add('hidden');
  }
  activeAgentId = id;
  const agent = agents.get(id);
  agent.messagesEl.classList.remove('hidden');
  document.getElementById('model-select').value = agent.model;
  const learnToggle = document.getElementById('learn-toggle');
  learnToggle.classList.toggle('active', agent.learnMode);
  document.getElementById('think-toggle').classList.toggle('active', agent.thinkMode);
  document.getElementById('undo-btn').classList.toggle('visible', !!agent.undoSnapshot);
  document.getElementById('send-btn').disabled = agent.isTyping;
  const msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
  renderAgentTabs();
}

function addAgent() {
  const id = createAgent();
  renderAgentTabs();
  switchAgent(id);
}

function removeAgent(id) {
  if (agents.size <= 1) return;
  const agent = agents.get(id);
  if (agent?.messagesEl) agent.messagesEl.remove();
  agents.delete(id);
  if (id === activeAgentId) {
    activeAgentId = null;
    switchAgent(agents.keys().next().value);
  } else {
    renderAgentTabs();
  }
}

// Init first agent
(function initAgents() {
  const id = createAgent();
  activeAgentId = id;
  agents.get(id).messagesEl.classList.remove('hidden');
  renderAgentTabs();
})();

// Zeichenzähler für Chat-Input
(function initCharCounter() {
  const input = document.getElementById('chat-input');
  const counter = document.getElementById('char-counter');
  input.addEventListener('input', () => {
    counter.textContent = `${input.value.length}/800`;
  });
})();

const TEXT_EXT = new Set([
  'js','jsx','ts','tsx','mjs','cjs','py','pyw','html','htm','xhtml','css','scss','sass','less',
  'json','json5','jsonc','md','mdx','txt','java','c','cpp','cc','cxx','h','hpp','hxx',
  'cs','rb','php','rs','go','sql','xml','svg','yaml','yml','sh','bash','zsh','fish',
  'toml','ini','cfg','conf','env','gitignore','gitattributes','editorconfig',
  'dockerfile','makefile','cmake','gradle','properties','vue','svelte','astro',
  'r','kt','kts','swift','dart','lua','pl','ex','exs','erl','hs','elm',
  'clj','cljs','fs','fsx','ml','v','tf','hcl','prisma','graphql','gql'
]);

function isText(name) {
  const lower = name.toLowerCase();
  if (['dockerfile','makefile','.gitignore','.env','.env.example','.editorconfig'].includes(lower)) return true;
  const ext = name.split('.').pop().toLowerCase();
  return TEXT_EXT.has(ext);
}

function getLang(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ({
    js:'javascript', jsx:'javascript', mjs:'javascript', cjs:'javascript',
    ts:'typescript', tsx:'typescript',
    py:'python', pyw:'python',
    html:'html', htm:'html', xhtml:'html', vue:'html', svelte:'html',
    css:'css', scss:'scss', sass:'scss', less:'less',
    json:'json', json5:'json', jsonc:'json',
    md:'markdown', mdx:'markdown',
    java:'java', c:'c', cpp:'cpp', cc:'cpp', cxx:'cpp', h:'cpp', hpp:'cpp',
    cs:'csharp', rb:'ruby', php:'php', rs:'rust', go:'go', kt:'kotlin', kts:'kotlin',
    swift:'swift', dart:'dart', lua:'lua',
    sql:'sql', xml:'xml', svg:'xml', yaml:'yaml', yml:'yaml',
    sh:'shell', bash:'shell', zsh:'shell', fish:'shell',
    toml:'ini', ini:'ini', cfg:'ini', conf:'ini', properties:'ini',
    graphql:'graphql', gql:'graphql', prisma:'prisma',
    r:'r', pl:'perl', ex:'elixir', exs:'elixir', hs:'haskell', elm:'elm',
    clj:'clojure', fs:'fsharp',
  })[ext] || 'plaintext';
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  return ({
    js:'fa-solid fa-bolt', jsx:'fa-solid fa-bolt', ts:'fa-solid fa-bolt', tsx:'fa-solid fa-bolt',
    py:'fa-brands fa-python', html:'fa-solid fa-code', htm:'fa-solid fa-code',
    css:'fa-solid fa-paintbrush', scss:'fa-solid fa-paintbrush', sass:'fa-solid fa-paintbrush',
    json:'fa-solid fa-database', md:'fa-solid fa-file-lines',
    java:'fa-brands fa-java', php:'fa-brands fa-php', rs:'fa-solid fa-gear',
    go:'fa-solid fa-cube', sql:'fa-solid fa-database', sh:'fa-solid fa-terminal',
    bash:'fa-solid fa-terminal', vue:'fa-brands fa-vuejs', swift:'fa-brands fa-swift',
    kt:'fa-solid fa-k', dart:'fa-solid fa-d', rb:'fa-solid fa-gem',
    yaml:'fa-solid fa-file-code', yml:'fa-solid fa-file-code',
  })[ext] || 'fa-solid fa-file-code';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function escAttr(s) { return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

// ── 2. Virtual FS helpers ─────────────────────────────────────────────────────
function addFile(rawPath, content) {
  let path = rawPath.replace(/\\/g,'/').replace(/^\/+/,'');
  if (!path) return;
  if (path.startsWith('__MACOSX') || path.includes('/.DS_Store') || path.endsWith('.DS_Store')) return;
  if (content.length > 200000) content = content.slice(0,200000) + '\n\n// [... Datei gekürzt ...]';
  const name = path.split('/').pop();
  // Dispose old Monaco model so the URI is freed — prevents stale model being reused
  if (vfs[path]?.model) { vfs[path].model.dispose(); }
  vfs[path] = { content, language: getLang(name), model: null };
}

function clearVFS() {
  Object.values(vfs).forEach(f => { if (f.model) { f.model.dispose(); f.model = null; } });
  Object.keys(vfs).forEach(k => delete vfs[k]);
  openTabs = [];
  activeTab = null;
  if (editor) editor.setModel(null);
  document.getElementById('editor-placeholder').style.display = 'flex';
  const bar        = document.getElementById('tabs-bar');
  const previewBtn = document.getElementById('preview-btn');
  const runBtn     = document.getElementById('run-btn');
  bar.innerHTML = '';
  bar.appendChild(previewBtn);
  bar.appendChild(runBtn);
}

// ── 3. File Tree ──────────────────────────────────────────────────────────────
function renderTree() {
  const tree = document.getElementById('file-tree');
  const paths = Object.keys(vfs).sort();

  if (!paths.length) {
    tree.innerHTML = `<div class="tree-empty"><i class="fa-solid fa-folder-open"></i>
      Lade einen Ordner hoch oder erstelle eine neue Datei mit dem Plus-Button.</div>`;
    return;
  }

  // Group into root files and top-level folders
  const rootFiles = [];
  const folders   = {};  // folderName → [paths]

  paths.forEach(p => {
    const parts = p.split('/');
    if (parts.length === 1) {
      rootFiles.push(p);
    } else {
      const folder = parts[0];
      if (!folders[folder]) folders[folder] = [];
      folders[folder].push(p);
    }
  });

  let html = '';

  rootFiles.forEach(p => {
    const name = p.split('/').pop();
    const active = p === activeTab ? ' active' : '';
    html += `<div class="tree-file${active}" data-path="${escAttr(p)}" title="${esc(p)}">
      <i class="${fileIcon(name)}"></i><span class="fname">${esc(name)}</span></div>`;
  });

  Object.keys(folders).sort().forEach(folder => {
    html += `<div class="tree-folder"><i class="fa-solid fa-folder"></i><span>${esc(folder)}</span></div>`;
    folders[folder].forEach(p => {
      const name   = p.split('/').pop();
      const rel    = p.slice(folder.length + 1);
      const depth  = rel.split('/').length; // 1 = direct child, 2+ = deeper
      const indent = 24 + (depth - 1) * 12;
      const active = p === activeTab ? ' active' : '';
      html += `<div class="tree-file${active}" data-path="${escAttr(p)}" title="${esc(p)}"
        style="padding-left:${indent}px">
        <i class="${fileIcon(name)}"></i><span class="fname">${esc(name)}</span></div>`;
    });
  });

  tree.innerHTML = html;
}

document.getElementById('file-tree').addEventListener('click', e => {
  const el = e.target.closest('.tree-file');
  if (el && el.dataset.path) openTab(el.dataset.path);
});

// ── 4. Tabs ───────────────────────────────────────────────────────────────────
function renderTabs() {
  const bar        = document.getElementById('tabs-bar');
  const previewBtn = document.getElementById('preview-btn');
  const runBtn     = document.getElementById('run-btn');

  bar.innerHTML = openTabs.map(p => {
    const name   = p.split('/').pop();
    const active = p === activeTab ? ' active' : '';
    return `<div class="tab${active}" data-path="${escAttr(p)}" title="${esc(p)}">
      <i class="${fileIcon(name)}"></i>
      <span>${esc(name)}</span>
      <span class="tab-close" data-close="${escAttr(p)}"><i class="fa-solid fa-xmark"></i></span>
    </div>`;
  }).join('');

  bar.appendChild(previewBtn);
  bar.appendChild(runBtn);

  const activeEl = bar.querySelector('.tab.active');
  if (activeEl) activeEl.scrollIntoView({ inline: 'nearest' });

  updateActionButton();
}

document.getElementById('tabs-bar').addEventListener('click', e => {
  const closeEl = e.target.closest('[data-close]');
  if (closeEl) { closeTab(closeEl.dataset.close); return; }
  const tab = e.target.closest('.tab');
  if (tab && tab.dataset.path) switchTab(tab.dataset.path);
});

function openTab(path) {
  if (!vfs[path]) return;
  if (vfs[path].binary) {
    // Binary file: only highlight in tree, don't open in editor
    activeTab = path;
    renderTree();
    return;
  }
  if (!openTabs.includes(path)) openTabs.push(path);
  switchTab(path);
}

function switchTab(path) {
  if (!vfs[path]) return;
  activeTab = path;

  if (editor) {
    if (!vfs[path].model) {
      const uri = monaco.Uri.parse('file:///' + path.replace(/\s/g, '%20'));
      // If a stale model with this URI exists, dispose it first
      const stale = monaco.editor.getModel(uri);
      if (stale) stale.dispose();
      vfs[path].model = monaco.editor.createModel(vfs[path].content, vfs[path].language, uri);
      vfs[path].model.onDidChangeContent(() => { vfs[path].content = vfs[path].model.getValue(); });
    }
    editor.setModel(vfs[path].model);
    document.getElementById('editor-placeholder').style.display = 'none';
    editor.layout();
  }

  renderTabs();
  renderTree();
}

function closeTab(path) {
  const idx = openTabs.indexOf(path);
  if (idx === -1) return;

  if (vfs[path]?.model) { vfs[path].model.dispose(); vfs[path].model = null; }
  openTabs.splice(idx, 1);

  if (activeTab === path) {
    const next = openTabs[idx] || openTabs[idx - 1] || null;
    if (next) {
      switchTab(next);
    } else {
      activeTab = null;
      if (editor) editor.setModel(null);
      document.getElementById('editor-placeholder').style.display = 'flex';
        }
  }

  renderTabs();
  renderTree();
}

// ── 5a. Resizable Panels ──────────────────────────────────────────────────────
function initResizers() {
  const sidebar   = document.getElementById('sidebar');
  const chatPanel = document.getElementById('chat-panel');

  function makeResizer(id, getStart, apply) {
    const el = document.getElementById(id);
    el.addEventListener('mousedown', function(e) {
      e.preventDefault();
      const startX = e.clientX;
      const startSize = getStart();
      el.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';

      function onMove(e) {
        apply(startSize, e.clientX - startX);
        if (editor) editor.layout();
      }
      function onUp() {
        el.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  makeResizer('resizer-left',
    () => sidebar.offsetWidth,
    (start, dx) => { sidebar.style.width = Math.max(80, Math.min(480, start + dx)) + 'px'; }
  );
  makeResizer('resizer-right',
    () => chatPanel.offsetWidth,
    (start, dx) => { chatPanel.style.width = Math.max(150, Math.min(580, start - dx)) + 'px'; }
  );
}

// ── 5. Monaco Init ────────────────────────────────────────────────────────────
function initMonaco() {
  const savedMode = localStorage.getItem('colorMode');
  if (savedMode === 'light') document.body.classList.add('light-mode');

  editor = monaco.editor.create(document.getElementById('monaco-container'), {
    theme:                     savedMode === 'light' ? 'vs' : 'vs-dark',
    automaticLayout:           false,
    minimap:                   { enabled: false },
    fontSize:                  13,
    lineHeight:                20,
    fontFamily:                "'Cascadia Code', 'Fira Code', Consolas, monospace",
    fontLigatures:             true,
    scrollBeyondLastLine:      false,
    renderLineHighlight:       'line',
    smoothScrolling:           true,
    cursorSmoothCaretAnimation:'on',
    padding:                   { top: 12, bottom: 12 },
    wordWrap:                  'off',
    tabSize:                   2,
    insertSpaces:              true,
    bracketPairColorization:   { enabled: true },
    guides:                    { bracketPairs: true },
  });

  window.addEventListener('resize', () => editor && editor.layout());

  // Ctrl+S / Cmd+S → Speichern
  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, () => {
    document.getElementById('btn-save').click();
  });

  // No auto-open — user starts by creating a file or uploading

  initResizers();
}

// ── 6. File Upload & Save ─────────────────────────────────────────────────────

// Öffnen: versuche showDirectoryPicker (Chrome/Edge), fallback auf file input (Firefox)
document.getElementById('btn-folder').onclick = async () => {
  if ('showDirectoryPicker' in window) {
    try {
      const handle = await window.showDirectoryPicker({ mode: 'readwrite' });
      dirHandle = handle;
      clearVFS();
      await readDirHandle(handle, handle.name + '/');
      renderTree();
      sysMsg(`Ordner geöffnet: ${Object.keys(vfs).length} Dateien`);
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      // API nicht verfügbar oder Fehler → fallback
    }
  }
  document.getElementById('folder-input').click();
};

async function readDirHandle(handle, prefix) {
  for await (const [name, entry] of handle.entries()) {
    if (entry.kind === 'directory') {
      if (name.startsWith('.') || name === '__MACOSX' || name === 'node_modules') continue;
      await readDirHandle(entry, prefix + name + '/');
    } else {
      if (name.startsWith('.') || name === '.DS_Store') continue;
      if (isText(name)) {
        try {
          const file    = await entry.getFile();
          const content = await file.text();
          addFile(prefix + name, content);
        } catch {}
      } else {
        const path = (prefix + name).replace(/\\/g,'/').replace(/^\/+/,'');
        if (path && !path.startsWith('__MACOSX')) {
          vfs[path] = { content: '', language: 'plaintext', model: null, binary: true };
        }
      }
    }
  }
}

document.getElementById('folder-input').addEventListener('change', async function(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  dirHandle = null;

  clearVFS();

  for (const file of files) {
    if (file.name.startsWith('.') || file.name === '.DS_Store') continue;
    const path = file.webkitRelativePath;
    if (!path) continue;
    if (isText(file.name)) {
      try {
        const content = await file.text();
        addFile(path, content);
      } catch {}
    } else {
      const cleanPath = path.replace(/\\/g,'/').replace(/^\/+/,'');
      if (cleanPath && !cleanPath.startsWith('__MACOSX')) {
        vfs[cleanPath] = { content: '', language: 'plaintext', model: null, binary: true };
      }
    }
  }

  renderTree();
  sysMsg(`Projekt geladen: ${Object.keys(vfs).length} Dateien`);
  e.target.value = '';
});

// Drag & Drop Ordner in den Dateibaum
(function() {
  const treeEl = document.getElementById('file-tree');

  async function readDropEntry(entry, prefix) {
    const name = entry.name;
    if (name.startsWith('.') || name === '__MACOSX') return;
    if (entry.isDirectory) {
      if (name === 'node_modules') return;
      await new Promise(resolve => {
        const reader = entry.createReader();
        const readBatch = () => {
          reader.readEntries(async entries => {
            if (!entries.length) { resolve(); return; }
            for (const e of entries) await readDropEntry(e, prefix + name + '/');
            readBatch();
          });
        };
        readBatch();
      });
    } else {
      if (name === '.DS_Store') return;
      if (isText(name)) {
        try {
          const file = await new Promise((res, rej) => entry.file(res, rej));
          const content = await file.text();
          addFile(prefix + name, content);
        } catch {}
      } else {
        const path = (prefix + name).replace(/\\/g,'/').replace(/^\/+/,'');
        if (path) vfs[path] = { content: '', language: 'plaintext', model: null, binary: true };
      }
    }
  }

  treeEl.addEventListener('dragover', e => {
    e.preventDefault();
    treeEl.classList.add('drag-over');
  });
  treeEl.addEventListener('dragleave', e => {
    if (!treeEl.contains(e.relatedTarget)) treeEl.classList.remove('drag-over');
  });
  treeEl.addEventListener('drop', async e => {
    e.preventDefault();
    treeEl.classList.remove('drag-over');
    const items = Array.from(e.dataTransfer.items || []);
    if (!items.length) return;
    clearVFS();
    dirHandle = null;
    for (const item of items) {
      const entry = item.webkitGetAsEntry ? item.webkitGetAsEntry() : null;
      if (!entry) continue;
      await readDropEntry(entry, entry.isDirectory ? entry.name + '/' : '');
    }
    renderTree();
    sysMsg(`Projekt geladen: ${Object.keys(vfs).length} Dateien`);
  });
})();

// Speichern
document.getElementById('btn-save').onclick = async () => {
  if (dirHandle) {
    // Alle Dateien zurück in den Ordner schreiben
    let saved = 0, errors = 0;
    for (const [path, file] of Object.entries(vfs)) {
      const content = file.model ? file.model.getValue() : file.content;
      try {
        const parts = path.split('/');
        let dir = dirHandle;
        for (let i = 0; i < parts.length - 1; i++) {
          dir = await dir.getDirectoryHandle(parts[i], { create: true });
        }
        const fh = await dir.getFileHandle(parts[parts.length - 1], { create: true });
        const wr = await fh.createWritable();
        await wr.write(content);
        await wr.close();
        saved++;
      } catch { errors++; }
    }
    sysMsg(`${saved} Datei(en) gespeichert${errors ? ` (${errors} Fehler)` : ''}.`);
    return;
  }

  if (!activeTab || !vfs[activeTab]) {
    sysMsg('Keine Datei geöffnet.');
    return;
  }

  const content = vfs[activeTab].model ? vfs[activeTab].model.getValue() : vfs[activeTab].content;
  const name    = activeTab.split('/').pop();

  if ('showSaveFilePicker' in window) {
    try {
      const ext = name.includes('.') ? name.split('.').pop() : '';
      const fh  = await window.showSaveFilePicker({
        suggestedName: name,
        types: ext ? [{ description: 'Datei', accept: { 'text/plain': ['.' + ext] } }] : [],
      });
      const wr = await fh.createWritable();
      await wr.write(content);
      await wr.close();
      sysMsg(`${name} gespeichert.`);
    } catch (e) {
      if (e.name !== 'AbortError') sysMsg('Fehler beim Speichern.');
    }
  } else {
    // Fallback: Download
    const blob = new Blob([content], { type: 'text/plain' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
  }
};

// Neue Datei
document.getElementById('btn-new').onclick = () => {
  const dir = activeTab && activeTab.includes('/')
    ? activeTab.slice(0, activeTab.lastIndexOf('/') + 1)
    : '';
  let name = dir + 'Unbenannt';
  let n = 1;
  while (vfs[name]) { n++; name = dir + 'Unbenannt ' + n; }
  vfs[name] = { content: '', language: 'plaintext', model: null };
  openTab(name);
  renderTree();
  setTimeout(() => startRename(name), 80);
};

function startTreeRename(path) {
  renderTree();
  const el = [...document.querySelectorAll('#file-tree .tree-file')].find(e => e.dataset.path === path);
  if (!el) return;
  const nameSpan = el.querySelector('.fname');
  if (!nameSpan) return;
  const oldName = path.split('/').pop();
  const input = document.createElement('input');
  input.value = oldName;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--accent);' +
    'color:inherit;font:inherit;outline:none;width:' + Math.max(60, oldName.length * 7 + 20) + 'px;' +
    'padding:0;margin:0;max-width:150px;';
  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    finishRename(path, input.value.trim() || oldName);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderTree(); }
  });
  nameSpan.replaceWith(input);
  input.focus();
  input.select();
}

// ── 6c. Tab Rename ────────────────────────────────────────────────────────────
document.getElementById('tabs-bar').addEventListener('dblclick', e => {
  const tab = e.target.closest('.tab');
  if (tab && tab.dataset.path) startRename(tab.dataset.path);
});

function startRename(path) {
  renderTabs();
  let targetTab = null;
  document.querySelectorAll('#tabs-bar .tab').forEach(el => {
    if (el.dataset.path === path) targetTab = el;
  });
  if (!targetTab) return;

  const nameSpan = targetTab.querySelector('span:not(.tab-close)');
  if (!nameSpan) return;

  const oldName = path.split('/').pop();
  const input   = document.createElement('input');
  input.value   = oldName;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid var(--accent);' +
    'color:inherit;font:inherit;outline:none;width:' + Math.max(60, oldName.length * 7 + 20) + 'px;padding:0;margin:0;';

  let committed = false;
  const commit = () => {
    if (committed) return;
    committed = true;
    finishRename(path, input.value.trim() || oldName);
  };
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); commit(); }
    if (e.key === 'Escape') { committed = true; renderTabs(); }
  });

  nameSpan.replaceWith(input);
  input.focus();
  input.select();
}

function finishRename(oldPath, newName) {
  const dir     = oldPath.includes('/') ? oldPath.slice(0, oldPath.lastIndexOf('/') + 1) : '';
  const newPath = dir + newName;

  if (newPath === oldPath) { renderTabs(); return; }
  if (vfs[newPath]) { sysMsg('Eine Datei mit diesem Namen existiert bereits.'); renderTabs(); return; }

  const file     = vfs[oldPath];
  const newLang  = getLang(newName);
  const content  = file.model ? file.model.getValue() : file.content;

  if (file.model) { file.model.dispose(); file.model = null; }
  file.content  = content;
  file.language = newLang;
  vfs[newPath]  = file;
  delete vfs[oldPath];

  const tabIdx = openTabs.indexOf(oldPath);
  if (tabIdx !== -1) openTabs[tabIdx] = newPath;

  if (activeTab === oldPath) {
    activeTab = newPath;
    if (editor) {
      const uri = monaco.Uri.parse('file:///' + newPath.replace(/\s/g, '%20'));
      vfs[newPath].model = monaco.editor.createModel(content, newLang, uri);
      vfs[newPath].model.onDidChangeContent(() => { vfs[newPath].content = vfs[newPath].model.getValue(); });
      editor.setModel(vfs[newPath].model);
    }
  }

  renderTabs();
  renderTree();
}


// ── 8. Prompt Builder ─────────────────────────────────────────────────────────
function buildPrompt(msg, agent, plan) {
  const learnExtra = agent.learnMode
    ? `\n- LERNMODUS AKTIV: Erkläre jede Änderung ausführlich Schritt für Schritt — was wurde geändert, warum, und was bewirkt es. Der Schüler soll wirklich verstehen, was passiert.`
    : `\n- Führe Aufgaben direkt aus. Antworte kurz und präzise — keine langen Einleitungen, kein Wiederholen der Aufgabe.`;

  const contextPaths = openTabs.length > 0
    ? openTabs
    : Object.keys(vfs).filter(p => !vfs[p].binary).sort();

  const hasFiles = contextPaths.length > 0;
  const quipInstruction = hasFiles
    ? ` oder (wenn du zuerst die Dateien analysierst) mit "Schaue mir die Dateien an."`
    : ``;

  let p = `Du bist ein hilfreicher Coding-Assistent für Schüler am Leibniz-Montessori-Gymnasium Düsseldorf (Klassen 5–10).

Regeln:
- Schreibe Code nur, wenn der Schüler das explizit möchte (z.B. "bau", "schreib", "ergänze", "implementiere")
- Bei offenen oder Meta-Fragen (z.B. "was könnte man ergänzen?", "wäre das sinnvoll?", "wie würde man das machen?") antworte nur mit Text — plane und diskutiere, ohne sofort Code zu schreiben
- Beantworte NUR Fragen zu Programmierung und Informatik
- Antworte in der Sprache des Schülers (Deutsch oder Englisch)
- Verwende immer Markdown-Codeblöcke — und schreibe dabei immer den **Dateinamen** als Bezeichner (z.B. \`\`\`index.html, \`\`\`Main.java, \`\`\`README.md) — NICHT die Sprache (\`\`\`html, \`\`\`java, \`\`\`markdown)
- Beginne NIEMALS mit "Verstanden", "Ich baue jetzt", "Natürlich" oder ähnlichen Einleitungen — starte direkt mit der Antwort${quipInstruction}${learnExtra}`;

  if (hasFiles) {
    const label = openTabs.length > 0 ? 'geöffnete Tabs' : 'alle Projektdateien';
    p += `\n\n### PROJEKTDATEIEN (${label}) ###\n`;
    let totalChars = 0;
    contextPaths.forEach(path => {
      if (!vfs[path]) return;
      if (totalChars > 200000) { p += `\n// [weitere Dateien ausgelassen — Kontextlimit erreicht]\n`; return; }
      const raw = vfs[path].content;
      const content = raw.length > 60000 ? raw.slice(0, 60000) + '\n// [... gekürzt]' : raw;
      p += `\n--- ${path} (${vfs[path].language}) ---\n${content}\n`;
      totalChars += content.length;
    });
    if (activeTab) p += `\n### AKTUELL SICHTBARE DATEI ###\n${activeTab}\n`;
    p += `\nWICHTIG – Dateien ausgeben:
REGEL: Jeder Codeblock MUSS den Dateinamen als Bezeichner haben — z.B. \`\`\`Main.java, \`\`\`README.md, \`\`\`style.css. NIE nur die Sprache (\`\`\`java, \`\`\`markdown, \`\`\`css).
So werden Dateien automatisch im richtigen Ort im Dateibaum angelegt oder aktualisiert.

Für ÄNDERUNGEN an bestehenden Dateien:
1. Lies zuerst den vorhandenen Code und finde die betroffene Stelle(n).
2. Gib NUR die geänderte Stelle als SEARCH/REPLACE-Block aus:
<<<<<<< SEARCH
exakter alter Code (mind. 2–3 Zeilen Kontext drumherum)
=======
neuer Code
>>>>>>> REPLACE
3. Mehrere SEARCH/REPLACE-Blöcke sind erlaubt wenn mehrere Stellen geändert werden.
4. Schreibe die GESAMTE Datei NUR wenn: (a) mehr als die Hälfte geändert wird, (b) es eine neue Datei ist, oder (c) explizit ein Komplett-Rewrite gewünscht ist.
5. Neue Dateien: Einfach als \`\`\`dateiname.ext Codeblock ausgeben — wird automatisch angelegt.
6. Mehrere Dateien gleichzeitig: Mehrere Codeblöcke mit je eigenem Dateinamen ausgeben — alle werden automatisch angelegt.
WICHTIG bei neuen Projekten mit mehreren Dateien: Wenn die aktuelle Datei "Unbenannt" oder leer ist, ignoriere sie — erstelle einfach die neuen Projektdateien mit den richtigen Namen (z.B. index.html, style.css, script.js). Benenne "Unbenannt" NICHT um.
VERBOTEN: Niemals nur einen Teil ausgeben (löscht den Rest). Wenn unklar: SEARCH/REPLACE. Niemals denselben Inhalt in mehrere Dateien kopieren.
Der SEARCH-Text muss exakt so im Original stehen (Leerzeichen und Einrückung beachten).`;
  }

  if (agent.chatHistory.length > 0) {
    p += '\n### BISHERIGES GESPRÄCH ###\n';
    agent.chatHistory.slice(-10).forEach(m => {
      p += `${m.role === 'user' ? 'Schüler' : 'Helper'}: "${m.text}"\n`;
    });
  }

  if (plan) {
    p += `\n### IMPLEMENTIERUNGSPLAN (bereits analysiert — direkt umsetzen) ###\n${plan}\n`;
  }

  p += `\n### AKTUELLE FRAGE ###\nSchüler: "${msg}"\nHelper:`;
  return p;
}

// ── 8b. Planning Prompt + Fetch ───────────────────────────────────────────────
function buildPlanningPrompt(msg, agent) {
  let p = `Du bist ein Coding-Assistent. Analysiere die folgende Aufgabe und erstelle einen präzisen Implementierungsplan.

WICHTIG: Schreibe KEINEN Code. Nur der Plan.
Gib aus:
1. Welche Dateien betroffen sind
2. Welche konkreten Änderungen nötig sind (kurz, spezifisch)
3. Reihenfolge der Schritte`;

  const contextPaths = openTabs.length > 0 ? openTabs : Object.keys(vfs).filter(p => !vfs[p].binary).sort();
  if (contextPaths.length > 0) {
    p += `\n\n### PROJEKTDATEIEN ###\n`;
    let totalChars = 0;
    contextPaths.forEach(path => {
      if (!vfs[path] || totalChars > 80000) return;
      const raw = vfs[path].content;
      const content = raw.length > 20000 ? raw.slice(0, 20000) + '\n// [... gekürzt]' : raw;
      p += `\n--- ${path} ---\n${content}\n`;
      totalChars += content.length;
    });
  }

  if (agent.chatHistory.length > 0) {
    p += '\n### BISHERIGES GESPRÄCH ###\n';
    agent.chatHistory.slice(-6).forEach(m => {
      p += `${m.role === 'user' ? 'Schüler' : 'Helper'}: "${m.text}"\n`;
    });
  }

  p += `\n### AUFGABE ###\nSchüler: "${msg}"\nImplementierungsplan:`;
  return p;
}

async function fetchPlan(planPrompt, modelKey) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 55000);
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt: planPrompt, model: modelKey }),
      signal: controller.signal,
    });
    clearTimeout(timer);
    if (!res.ok) return null;
    const data = await res.json();
    return data.error ? null : (data.text || null);
  } catch {
    clearTimeout(timer);
    return null;
  }
}

function activePane() {
  return agents.get(activeAgentId)?.messagesEl ?? document.getElementById('chat-messages');
}
function scrollMsgs() {
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
}

function detectExtension(msg) {
  const m = msg.toLowerCase();
  if (/\b(website|webseite|html|webpage|web\s*page|landing\s*page|homepage)\b/.test(m)) return 'html';
  if (/\bcss\b|\bstylesheet\b|\bstyles?\b/.test(m)) return 'css';
  if (/\bpython\b|\b\.py\b/.test(m)) return 'py';
  if (/\bjava\b(?!script)/.test(m)) return 'java';
  if (/\bjavascript\b|\bjs\b|\b\.js\b/.test(m)) return 'js';
  if (/\bphp\b/.test(m)) return 'php';
  if (/\bc\+\+\b|\bcpp\b/.test(m)) return 'cpp';
  if (/\bc#\b|\bcsharp\b/.test(m)) return 'cs';
  return null;
}

function maybePromptRename(text, msgs) {
  if (!activeTab) return Promise.resolve();
  const name = activeTab.split('/').pop();
  // Only prompt for files without extension (Unbenannt, Unbenannt 2, …)
  if (!/^Unbenannt(\s+\d+)?$/.test(name)) return Promise.resolve();

  const ext = detectExtension(text);
  if (!ext) return Promise.resolve();

  const newName = name + '.' + ext;

  return new Promise(resolve => {
    const d = document.createElement('div');
    d.className = 'chat-msg system';
    d.innerHTML = `„${name}" in <b>${newName}</b> umbenennen?&nbsp; ` +
      `<button class="rename-btn" data-ans="1" style="margin-right:4px">[1] Ja</button>` +
      `<button class="rename-btn" data-ans="2">[2] Nein</button>`;

    const finish = (ans) => {
      document.removeEventListener('keydown', keyHandler);
      if (ans === '1') {
        finishRename(activeTab, newName);
        d.innerHTML = `✓ Umbenannt zu <b>${newName}</b>`;
      } else {
        d.innerHTML = `Dateiname bleibt „${name}".`;
      }
      resolve();
    };

    d.addEventListener('click', e => {
      const btn = e.target.closest('[data-ans]');
      if (btn) finish(btn.dataset.ans);
    });

    const keyHandler = e => {
      if (e.key === '1') finish('1');
      if (e.key === '2') finish('2');
    };
    document.addEventListener('keydown', keyHandler);

    msgs.appendChild(d);
    scrollMsgs();
  });
}

function sysMsgHtml(html) {
  const pane = activePane();
  const d = document.createElement('div');
  d.className = 'chat-msg system';
  d.innerHTML = html;
  pane.appendChild(d);
  scrollMsgs();
}

}

// ── Slash Commands ─────────────────────────────────────────────────────────
const SLASH_MODEL_NAMES = {
  qwen:           'Qwen3 Coder 480B',
  minimax:        'MiniMax M2.5',
  nemotron:       'Nemotron 3 Super',
  gemma:          'Gemma 4 31B',
  geminiflashlite:'Gemini 3.1 Flash Lite',
  llama:          'Llama 3.3 70B',
  kimi:           'Kimi K2',
};

function handleSlashCommand(text, agent) {
  const cmd = text.slice(1).trim().toLowerCase().split(/\s+/)[0];

  if (cmd === 'learn') {
    agent.learnMode = !agent.learnMode;
    document.getElementById('learn-toggle').classList.toggle('active', agent.learnMode);
    sysMsg(agent.learnMode
      ? 'Lernmodus aktiviert — Änderungen werden erklärt.'
      : 'Lernmodus deaktiviert — kompakte Antworten.');
    return true;
  }

  if (cmd === 'model') {
    const currentName = SLASH_MODEL_NAMES[agent.model] || agent.model;
    sysMsgHtml(
      `Aktuelles Modell: <b>${currentName}</b><br>` +
      `<span style="opacity:.65;font-size:11px">` +
      `1&nbsp;Qwen&nbsp;&nbsp;2&nbsp;MiniMax&nbsp;&nbsp;3&nbsp;Nemotron&nbsp;&nbsp;4&nbsp;Gemma&nbsp;&nbsp;5&nbsp;Gemini&nbsp;Lite` +
      `&nbsp;&nbsp;<kbd style="opacity:.5">Esc</kbd>&nbsp;=&nbsp;abbrechen</span>`
    );
    const KEYS = { '1':'qwen', '2':'minimax', '3':'nemotron', '4':'gemma', '5':'geminiflashlite', '6':'llama' };
    const handler = (e) => {
      if (KEYS[e.key]) {
        e.preventDefault();
        document.removeEventListener('keydown', handler);
        const m = KEYS[e.key];
        agent.model = m;
        document.getElementById('model-select').value = m;
        sysMsg(`Modell: ${SLASH_MODEL_NAMES[m]}`);
      } else if (e.key === 'Escape') {
        document.removeEventListener('keydown', handler);
      }
    };
    document.addEventListener('keydown', handler);
    return true;
  }

  if (cmd === 'enter') {
    // Toggle: Enter sends vs. Enter = newline (Ctrl+Enter sends)
    const ENTER_KEY = 'slashEnterSends';
    const nowSends = localStorage.getItem(ENTER_KEY) === 'true'; // default false
    const next = !nowSends;
    localStorage.setItem(ENTER_KEY, next);
    sysMsg(next ? 'Enter sendet Prompt.' : 'Enter = neue Zeile. Ctrl+Enter sendet.');
    applyEnterMode(next);
    return true;
  }

  if (cmd === 'undo') {
    if (!agent.undoSnapshot) {
      sysMsg('Nichts zum Rückgängigmachen.');
    } else {
      document.getElementById('undo-btn').click();
    }
    return true;
  }

  if (cmd === 'clear') {
    agent.chatHistory = [];
    agent.messagesEl.innerHTML = '<div class="chat-msg system">Chat geleert.</div>';
    return true;
  }

  if (cmd === 'agent') {
    addAgent();
    return true;
  }

  if (cmd === 'add') {
    document.getElementById('btn-new').click();
    return true;
  }

  if (cmd === 'delete') {
    document.getElementById('btn-delete').click();
    return true;
  }

  if (cmd === 'open') {
    document.getElementById('btn-folder').click();
    return true;
  }

  if (cmd === 'save') {
    // Download current file only (no dirHandle shortcut)
    if (!activeTab || !vfs[activeTab]) { sysMsg('Keine Datei geöffnet.'); return true; }
    const content = vfs[activeTab].model ? vfs[activeTab].model.getValue() : vfs[activeTab].content;
    const name    = activeTab.split('/').pop();
    const blob    = new Blob([content], { type: 'text/plain' });
    const url     = URL.createObjectURL(blob);
    const a       = document.createElement('a');
    a.href = url; a.download = name; a.click();
    URL.revokeObjectURL(url);
    sysMsg(`${name} heruntergeladen.`);
    return true;
  }

  if (cmd === 'saveall') {
    const files = Object.keys(vfs);
    if (!files.length) { sysMsg('Keine Dateien vorhanden.'); return true; }
    const enc = new TextEncoder();
    const zipInput = {};
    for (const [path, file] of Object.entries(vfs)) {
      zipInput[path] = enc.encode(file.model ? file.model.getValue() : file.content);
    }
    const zipped = fflate.zipSync(zipInput);
    const blob   = new Blob([zipped], { type: 'application/zip' });
    const url    = URL.createObjectURL(blob);
    const a      = document.createElement('a');
    a.href = url; a.download = 'projekt.zip'; a.click();
    URL.revokeObjectURL(url);
    sysMsg(`${files.length} Datei(en) als projekt.zip heruntergeladen.`);
    return true;
  }

  if (cmd === 'run') {
    const runLang = activeTab ? getRunLang(activeTab) : null;
    if (!activeTab) { sysMsg('Keine Datei geöffnet.'); return true; }
    if (runLang) toggleRunOutput();
    else togglePreview();
    return true;
  }

  if (cmd === 'think') {
    document.getElementById('think-toggle').click();
    return true;
  }

  if (cmd === 'mode') {
    const isLight = document.body.classList.toggle('light-mode');
    monaco.editor.setTheme(isLight ? 'vs' : 'vs-dark');
    localStorage.setItem('colorMode', isLight ? 'light' : 'dark');
    sysMsg(isLight ? 'Hell-Modus aktiviert.' : 'Dunkel-Modus aktiviert.');
    return true;
  }

  if (cmd === 'sanity') {
    const pane = activePane();
    const d = document.createElement('div');
    d.className = 'chat-msg system';
    d.textContent = 'Prüfe Modelle…';
    pane.appendChild(d);
    scrollMsgs();
    (async () => {
      try {
        const r = await fetch('/api/sanity');
        const { results } = await r.json();
        const lines = results.map(m => {
          if (m.status === 'online')        return `<span style="color:#4ade80">✓</span> ${m.name}: <b>Online</b> <span style="opacity:.5;font-size:10px">${m.ms}ms</span>`;
          if (m.status === 'timeout')       return `<span style="color:#fb923c">⏱</span> ${m.name}: <b>Timeout</b>`;
          if (m.status === 'rate-limited')  return `<span style="color:#4ade80">✓</span> ${m.name}: <b>Online</b> <span style="opacity:.5;font-size:10px">gedrosselt</span>`;
          return `<span style="color:#f87171">✗</span> ${m.name}: <b>Offline</b>`;
        });
        d.innerHTML = `<b>Modell-Status</b><br><span style="font-size:11px;line-height:2">${lines.join('<br>')}</span>`;
      } catch (e) {
        d.textContent = 'Sanity-Check fehlgeschlagen: ' + e.message;
      }
      scrollMsgs();
    })();
    return true;
  }

  if (cmd === 'help') {
    sysMsgHtml(
      `<b>Slash-Befehle:</b><br>` +
      `<span style="font-size:11px;line-height:1.7">` +
      `<b>/model</b> — Modell anzeigen / wechseln<br>` +
      `<b>/learn</b> — Lernmodus an/aus<br>` +
      `<b>/think</b> — Thinking Mode an/aus<br>` +
      `<b>/mode</b> — Hell-/Dunkel-Modus umschalten<br>` +
      `<b>/run</b> — Vorschau / Programm ausführen<br>` +
      `<b>/enter</b> — Enter-Taste: senden ↔ neue Zeile<br>` +
      `<b>/undo</b> — letzte KI-Änderung rückgängig<br>` +
      `<b>/clear</b> — Chat leeren<br>` +
      `<b>/agent</b> — neuen Agenten spawnen<br>` +
      `<b>/add</b> — neue Datei anlegen<br>` +
      `<b>/delete</b> — aktuelle Datei löschen<br>` +
      `<b>/open</b> — Ordner öffnen<br>` +
      `<b>/save</b> — aktuelle Datei herunterladen<br>` +
      `<b>/saveall</b> — alle Dateien als ZIP<br>` +
      `<b>/sanity</b> — alle Modelle auf Verfügbarkeit prüfen</span>`
    );
    return true;
  }

  return false;
}

// ── 7. Preview ────────────────────────────────────────────────────────────────

let previewActive = false;

function buildPreviewHtml() {
  // Find HTML entry point: active tab first, then any .html file
  const htmlFile = (activeTab && activeTab.match(/\.html?$/i))
    ? activeTab
    : Object.keys(vfs).find(p => p.match(/\.html?$/i));
  if (!htmlFile) return null;

  let html = vfs[htmlFile].content;

  // Resolve a relative href against the HTML file's directory
  const baseDir = htmlFile.includes('/') ? htmlFile.slice(0, htmlFile.lastIndexOf('/') + 1) : '';
  function resolvePath(href) {
    if (!href || /^(https?:|\/\/|data:|blob:)/i.test(href)) return null; // external — leave as-is
    const parts = (baseDir + href.replace(/^\.\//, '')).split('/');
    const normalized = [];
    for (const p of parts) { if (p === '..') normalized.pop(); else if (p && p !== '.') normalized.push(p); }
    return normalized.join('/');
  }

  // Replace <link rel="stylesheet" href="..."> with inline <style> if file is in VFS
  html = html.replace(/<link([^>]+)>/gi, (match, attrs) => {
    if (!/rel=["']stylesheet["']/i.test(attrs)) return match;
    const m = attrs.match(/href=["']([^"']+)["']/i);
    if (!m) return match;
    const resolved = resolvePath(m[1]);
    if (!resolved || !vfs[resolved]) return match;
    return `<style>${vfs[resolved].content}<\/style>`;
  });

  // Replace <script src="..."><\/script> with inline <script> if file is in VFS
  html = html.replace(/<script([^>]*)>\s*<\/script>/gi, (match, attrs) => {
    const m = attrs.match(/src=["']([^"']+)["']/i);
    if (!m) return match;
    const resolved = resolvePath(m[1]);
    if (!resolved || !vfs[resolved]) return match;
    const otherAttrs = attrs.replace(/\s*src=["'][^"']+["']/, '').trim();
    return `<script${otherAttrs ? ' ' + otherAttrs : ''}>${vfs[resolved].content}<\/script>`;
  });

  return html;
}

function togglePreview() {
  const frame = document.getElementById('preview-frame');
  const btn   = document.getElementById('preview-btn');

  previewActive = !previewActive;

  if (previewActive) {

    const html = buildPreviewHtml();

    frame.style.display = 'block';

    btn.innerHTML = '<i class="fa-solid fa-code"></i> Editor';

    frame.style.display = 'none';
    frame.srcdoc = '';
    monaco.style.display = 'block';
    btn.classList.remove('active');
    btn.innerHTML = '<i class="fa-solid fa-play"></i> Vorschau';

}

// ── Pyodide Worker (Python im Browser, non-blocking) ─────────────────────────
let _pyWorker = null;
let _pyWorkerReady = null;
let _pyInputSAB = null;     // SharedArrayBuffer(8):    Int32[0]=signal, Int32[1]=byteLen
let _pyInputDataSAB = null; // SharedArrayBuffer(4096): UTF-8 bytes of user input

const _PYODIDE_WORKER = `
importScripts('https://cdn.jsdelivr.net/pyodide/v0.27.0/full/pyodide.js');
let pyodide = null, inputSig = null, inputData = null;

self.onmessage = async (e) => {
  const msg = e.data;

  if (msg.type === 'init') {
    inputSig  = new Int32Array(msg.inputSAB);
    inputData = new Uint8Array(msg.inputDataSAB);
    try {
      pyodide = await loadPyodide();
      self._jsInput = (prompt) => {
        self.postMessage({ type: 'input_request', prompt: String(prompt ?? '') });
        Atomics.store(inputSig, 0, 0);
        Atomics.wait(inputSig, 0, 0);
        const len = Atomics.load(inputSig, 1);
        return new TextDecoder().decode(inputData.slice(0, len));
      };
      pyodide.runPython(
        "import builtins, js\\n" +
        "builtins.input = lambda p='': js._jsInput(str(p) if p else '')"
      );
      self.postMessage({ type: 'ready' });
    } catch(err) {
      self.postMessage({ type: 'init_error', message: String(err) });
    }
    return;
  }

  if (msg.type === 'run') {
    pyodide.setStdout({ batched: s => self.postMessage({ type: 'stdout', text: s }) });
    pyodide.setStderr({ batched: s => self.postMessage({ type: 'stderr', text: s }) });
    let exitCode = 0;
    try {
      await pyodide.runPythonAsync(msg.code);
    } catch(err) {
      self.postMessage({ type: 'stderr', text: err.message });
      exitCode = 1;
    }
    self.postMessage({ type: 'done', exitCode });
  }
};
`;

function _ensurePyWorker(out) {
  if (_pyWorker) return _pyWorkerReady;
  _pyInputSAB     = new SharedArrayBuffer(8);
  _pyInputDataSAB = new SharedArrayBuffer(4096);
  const blob = new Blob([_PYODIDE_WORKER], { type: 'application/javascript' });
  _pyWorker = new Worker(URL.createObjectURL(blob));
  _pyWorkerReady = new Promise((resolve, reject) => {
    const h = (e) => {
      if (e.data.type === 'ready')      { _pyWorker.removeEventListener('message', h); resolve(); }
      if (e.data.type === 'init_error') { _pyWorker.removeEventListener('message', h); reject(new Error(e.data.message)); }
    };
    _pyWorker.addEventListener('message', h);
  });
  out.innerHTML = `<span class="ro-info">Python-Umgebung wird geladen (~10 MB, einmalig)…</span>\n`;
  _pyWorker.postMessage({ type: 'init', inputSAB: _pyInputSAB, inputDataSAB: _pyInputDataSAB });
  return _pyWorkerReady;
}

function _submitPyInput(id) {
  const el = document.getElementById(id);
  if (!el) return;
  const value = el.value;
  const row = document.getElementById('py-row-' + id);
  if (row) row.outerHTML = `<span class="ro-stdout">${esc(value)}</span>\n`;
  const enc = new TextEncoder().encode(value);
  const sig  = new Int32Array(_pyInputSAB);
  const data = new Uint8Array(_pyInputDataSAB);
  const len  = Math.min(enc.length, data.length);
  data.set(enc.subarray(0, len));
  Atomics.store(sig, 1, len);
  Atomics.store(sig, 0, 1);
  Atomics.notify(sig, 0);
}

async function runPython(code, out) {
  if (typeof SharedArrayBuffer === 'undefined') {
    out.innerHTML = `<span class="ro-stderr">SharedArrayBuffer nicht verfügbar — bitte Seite neu laden (HTTPS erforderlich).</span>`;
    return;
  }
  try {
    await _ensurePyWorker(out);
  } catch(e) {
    out.innerHTML += `<span class="ro-stderr">Pyodide konnte nicht geladen werden: ${esc(String(e))}</span>`;
    return;
  }
  out.innerHTML = `<span class="ro-info">Ausführen (python)…</span>\n`;

  await new Promise((resolve) => {
    function onMsg(e) {
      const msg = e.data;
      if (msg.type === 'stdout') {
        out.insertAdjacentHTML('beforeend', `<span class="ro-stdout">${esc(msg.text)}</span>`);
        out.scrollTop = out.scrollHeight;
      } else if (msg.type === 'stderr') {
        out.insertAdjacentHTML('beforeend', `<span class="ro-stderr">${esc(msg.text)}</span>`);
        out.scrollTop = out.scrollHeight;
      } else if (msg.type === 'input_request') {
        const id = 'pyi-' + Date.now();
        out.insertAdjacentHTML('beforeend',
          `<span class="ro-input-prompt">${esc(msg.prompt)}</span>` +
          `<span id="py-row-${id}" class="ro-input-row">` +
          `<input id="${id}" class="ro-input" type="text" autocomplete="off" spellcheck="false">` +
          `<button class="ro-input-btn" onclick="_submitPyInput('${id}')">↵</button></span>\n`
        );
        out.scrollTop = out.scrollHeight;
        const el = document.getElementById(id);
        if (el) {
          el.focus();
          el.addEventListener('keydown', ev => { if (ev.key === 'Enter') _submitPyInput(id); });
        }
      } else if (msg.type === 'done') {
        _pyWorker.removeEventListener('message', onMsg);
        out.insertAdjacentHTML('beforeend',
          `\n<span class="${msg.exitCode === 0 ? 'ro-exit0' : 'ro-exit1'}">─── Exit ${msg.exitCode} ───</span>`
        );
        out.scrollTop = out.scrollHeight;
        resolve();
      }
    }
    _pyWorker.addEventListener('message', onMsg);
    _pyWorker.postMessage({ type: 'run', code });
  });
}

// ── Java (JDoodle API) ────────────────────────────────────────────────────────
async function runJava(code, out) {
  out.innerHTML = `<span class="ro-info">Kompiliere und führe aus (java)…</span>\n`;
  let res, data;
  try {
    res = await fetch('/api/jdoodle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code }),
    });
    data = await res.json();
  } catch (e) {
    out.innerHTML += `<span class="ro-stderr">Netzwerkfehler: ${esc(String(e))}</span>\n`;
    out.innerHTML += `<span class="ro-exit1">─── Exit 1 ───</span>`;
    return;
  }
  if (!res.ok || data.message) {
    out.innerHTML += `<span class="ro-stderr">${esc(data.message ?? 'Unbekannter Fehler')}</span>\n`;
    out.innerHTML += `<span class="ro-exit1">─── Exit 1 ───</span>`;
    return;
  }
  const exitCode = data.exitCode ?? 0;
  const output = (data.output ?? '').replace(/\n$/, '');
  out.innerHTML = '';
  if (output) out.innerHTML += `<span class="ro-stdout">${esc(output)}</span>`;
  out.innerHTML += `\n<span class="${exitCode === 0 ? 'ro-exit0' : 'ro-exit1'}">─── Exit ${exitCode} ───</span>`;
}

async function runCode() {
  const out  = document.getElementById('run-output');
  const lang = getRunLang(activeTab);
  if (!lang || !activeTab || !vfs[activeTab]) return;

  const code = vfs[activeTab].model ? vfs[activeTab].model.getValue() : vfs[activeTab].content;
  const filename = activeTab.split('/').pop();

  // Python → Pyodide (im Browser, kein API-Call)
  if (lang.language === 'python') { await runPython(code, out); return; }

  // Java → TeaVM (im Browser, kein API-Call)
  if (lang.language === 'java') { await runJava(code, out); return; }

  // Alle anderen → Wandbox via /api/run
  out.innerHTML = `<span class="ro-info">Ausführen (${lang.language})…</span>\n`;
  let res, data;
  try {
    res = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ language: lang.language, files: [{ name: filename, content: code }] }),
    });
    data = await res.json();
  } catch (e) {
    out.innerHTML += `<span class="ro-stderr">Netzwerkfehler: ${esc(String(e))}</span>`;
    return;
  }

  if (data.message) { out.innerHTML += `<span class="ro-stderr">${esc(data.message)}</span>`; return; }

  const run = data.run;
  if (run.stdout) out.innerHTML += `<span class="ro-stdout">${esc(run.stdout)}</span>`;
  if (run.stderr) out.innerHTML += `<span class="ro-stderr">${esc(run.stderr)}</span>`;
  out.innerHTML += `\n<span class="${run.code === 0 ? 'ro-exit0' : 'ro-exit1'}">─── Exit ${run.code} ───</span>`;
}
